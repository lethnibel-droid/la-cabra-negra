<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS - PRO</title>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #000000;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x:hidden; min-height:100vh; }

        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid var(--glass-border); border-radius:15px; box-shadow:0 8px 32px 0 rgba(0,0,0,0.8); padding:15px; margin-bottom:20px; }
        .neon-shadow-blue { box-shadow:0 0 15px var(--neon-blue); }
        .neon-shadow-purple { box-shadow:0 0 15px var(--neon-purple); }

        header { padding:20px; text-align:center; border-bottom:1px solid var(--neon-blue); margin-bottom:20px; }
        .logo { font-size:1.8rem; font-weight:bold; text-transform:uppercase; letter-spacing:3px; color: var(--neon-blue); text-shadow:0 0 10px var(--neon-blue); }

        nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; padding:15px; background:rgba(0,0,0,0.9); border-top:1px solid var(--neon-purple); z-index:1000; }
        nav button { background:none; border:none; color:#fff; font-size:0.8rem; cursor:pointer; transition:0.3s; }
        nav button.active { color: var(--neon-blue); text-shadow:0 0 8px var(--neon-blue); }

        .container { padding:20px; padding-bottom:100px; max-width:800px; margin:0 auto; }

        .section { display:none; }
        .section.active { display:block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        input, select { width:100%; padding:12px; margin:10px 0; background: rgba(255,255,255,0.1); border:1px solid var(--glass-border); color:#fff; border-radius:8px; }
        .btn-action { width:100%; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; text-transform:uppercase; margin-top:10px; }
        .btn-blue { background: var(--neon-blue); color:#000; }
        .btn-purple { background: var(--neon-purple); color:#fff; }

        .video-item { margin-bottom:25px; padding:15px; }
        .video-wrapper { position:relative; padding-bottom:56.25%; height:0; border-radius:10px; overflow:hidden; }
        .video-wrapper iframe { position:absolute; top:0; left:0; width:100%; height:100%; }

        #login-screen { height:80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; }

        .admin-only { display:none; border:1px solid red; }
    </style>
</head>
<body>

<header>
    <div class="logo">GOAT GLOBAL ADS</div>
</header>

<div class="container">

    <!-- LOGIN / REGISTRO POR EMAIL -->
    <div id="login-screen" class="section active">
        <h2 style="margin-bottom:20px;">BIENVENIDO A LA ÉLITE</h2>
        <input type="email" id="login-email" placeholder="Ingresa tu correo electrónico" required>
        <button class="btn-action btn-blue neon-shadow-blue" onclick="loginWithEmail()">Enviar enlace de acceso</button>
        <p style="margin-top:10px; font-size:0.8rem; color:var(--neon-purple);">Revisa tu correo para iniciar sesión.</p>
    </div>

    <!-- INICIO -->
    <div id="inicio" class="section">
        <div class="glass-card video-item">
            <h3>Publicar Nuevo Video</h3>
            <input type="text" id="video-url" placeholder="Pega URL de YouTube o Shorts">
            <button class="btn-action btn-purple" onclick="publicarVideo()">Subir a la Red</button>
        </div>
        <div id="feed-general"></div>
    </div>

    <!-- SHORTS -->
    <div id="shorts" class="section">
        <h2 style="color: var(--neon-purple); margin-bottom: 15px;">TOP SHORTS</h2>
        <div id="feed-shorts"></div>
    </div>

    <!-- PANEL USUARIO -->
    <div id="panel" class="section">
        <div class="glass-card">
            <h3>Mis Estadísticas</h3>
            <p id="user-info"></p>
            <p>Saldo Actual: <span id="user-balance" style="color: var(--neon-blue);">$0.00</span></p>
            <button onclick="logout()" style="background:none; color:red; border:none; cursor:pointer; margin-top:10px;">Cerrar Sesión</button>
        </div>
        <h3>Mis Publicaciones</h3>
        <div id="feed-usuario"></div>
    </div>

    <!-- PANEL DIRECTOR -->
    <div id="director" class="section">
        <h2 style="color:#ff4d4d; margin-bottom:20px;">PANEL DIRECTOR</h2>
        <div class="glass-card">
            <h4>Gestión de Balances</h4>
            <input type="text" id="admin-user-id" placeholder="ID de Usuario (UID)">
            <input type="number" id="admin-amount" placeholder="Cantidad ($)">
            <div style="display:flex; gap:10px;">
                <button class="btn-action btn-blue" onclick="ajustarSaldo('sumar')">Sumar</button>
                <button class="btn-action btn-purple" onclick="ajustarSaldo('resetear')">Resetear</button>
            </div>
        </div>
    </div>

</div>

<nav id="main-nav" style="display:none;">
    <button onclick="showSection('inicio')" id="btn-inicio">INICIO</button>
    <button onclick="showSection('shorts')" id="btn-shorts">SHORTS</button>
    <button onclick="showSection('panel')" id="btn-panel">MI PANEL</button>
    <button onclick="showSection('director')" id="btn-director" class="admin-only">DIRECTOR</button>
</nav>
