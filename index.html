<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT GLOBAL ADS</title>
<!-- Google Fonts Neon -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<style>
  /* === RESET === */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
  html, body { height: 100%; background: #000; color: #00f2ff; overflow-x: hidden; }
  
  /* === NAVIGATION === */
  nav { display: flex; justify-content: center; gap: 2rem; padding: 1rem; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border-bottom: 1px solid #00f2ff; }
  nav button { background: transparent; border: 1px solid #00f2ff; padding: 0.5rem 1rem; color: #00f2ff; cursor: pointer; border-radius: 8px; transition: 0.3s; }
  nav button:hover { box-shadow: 0 0 10px #00f2ff, 0 0 20px #bc13fe; }

  /* === SECTIONS === */
  section { display: none; padding: 2rem; min-height: calc(100vh - 70px); }
  section.active { display: block; }

  /* === CARDS === */
  .video-card { background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border: 1px solid #00f2ff; border-radius: 12px; margin: 1rem 0; padding: 1rem; box-shadow: 0 0 10px #00f2ff; display: flex; flex-direction: column; align-items: center; }
  .video-card iframe { width: 100%; border-radius: 12px; }
  .video-card p { margin-top: 0.5rem; text-align: center; }

  /* === BUTTONS === */
  .btn { border: 1px solid #bc13fe; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; color: #bc13fe; margin: 0.5rem; transition: 0.3s; }
  .btn:hover { box-shadow: 0 0 15px #bc13fe, 0 0 30px #00f2ff; }

  /* === ADMIN PANEL === */
  .admin-section { display: flex; flex-direction: column; gap: 1rem; }
  input, select { padding: 0.5rem; border-radius: 8px; border: 1px solid #00f2ff; background: rgba(0,0,0,0.5); color: #00f2ff; }

  /* === RESPONSIVE === */
  @media (max-width: 768px) { .video-card { width: 90%; } nav { flex-direction: column; gap: 1rem; } }
</style>
</head>
<body>

<nav>
  <button onclick="showSection('home')">Inicio</button>
  <button onclick="showSection('shorts')">Shorts</button>
  <button onclick="showSection('mypanel')">Mi Panel</button>
  <button onclick="showSection('director')">Director</button>
</nav>

<!-- === SECTIONS === -->
<section id="home" class="active">
  <h1>Bienvenido a GOAT GLOBAL ADS</h1>
  <div id="videos-home"></div>
</section>

<section id="shorts">
  <h1>Shorts</h1>
  <div id="videos-shorts"></div>
</section>

<section id="mypanel">
  <h1>Mi Panel</h1>
  <div id="my-videos"></div>
</section>

<section id="director">
  <h1>Director Panel</h1>
  <div id="admin-content"></div>
</section>

<!-- === LOGIN BUTTON === -->
<div style="position:fixed; bottom:1rem; right:1rem;">
  <button id="login-btn" class="btn">Iniciar sesión con Google</button>
  <span id="user-info" style="margin-left:1rem;"></span>
</div>

<!-- === FIREBASE SDK === -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .catch(err => alert(Error de persistencia: ${err.code}));

  const provider = new firebase.auth.GoogleAuthProvider();
  document.getElementById('login-btn').onclick = () => auth.signInWithRedirect(provider);

  auth.getRedirectResult()
    .then(result => {
      if (result.user) {
        const user = result.user;
        document.getElementById('user-info').textContent = user.displayName;
        const userRef = db.ref(users/${user.uid});
        userRef.get().then(snapshot => {
          if (!snapshot.exists()) {
            userRef.set({
              nombre: user.displayName,
              email: user.email,
              foto: user.photoURL,
              balance: 0,
              rango: "user",
              fecha_registro: firebase.database.ServerValue.TIMESTAMP
            });
          }
        }).catch(err => alert(Error DB: ${err.code}));
      }
    }).catch(err => alert(Login error: ${err.code}));

  // === SPA NAVIGATION ===
  function showSection(sectionId){
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    if(sectionId==='director') loadAdminPanel();
    if(sectionId==='mypanel') loadMyVideos();
    if(sectionId==='home') loadVideos();
    if(sectionId==='shorts') loadShorts();
  }

  // === MOTOR YOUTUBE ===
  function extractYoutubeID(url){
    const regex = /^.(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]).*/;
    const match = url.match(regex);
    if(match && match[2].length===11){
      return match[2];
    }
    return null;
  }

  function isShort(url){ return url.includes("/shorts/"); }

  // === ARRAY LOCAL PARA DEMOS ===
  let demoVideos = [];

  // === RENDER VIDEO ===
  function renderVideo(container, url){
    const id = extractYoutubeID(url);
    if(!id) return;
    const type = isShort(url) ? "short" : "normal";
    const div = document.createElement('div');
    div.className = "video-card";
    div.innerHTML = `<iframe height="200" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>
                     <p>Tipo: ${type}</p>`;
    container.appendChild(div);
  }

  // === CARGAR VIDEOS ===
  function loadVideos(){
    const container = document.getElementById('videos-home');
    container.innerHTML = '';
    demoVideos.forEach(url => { if(!isShort(url)) renderVideo(container, url); });
  }

  function loadShorts(){
    const container = document.getElementById('videos-shorts');
    container.innerHTML = '';
    demoVideos.forEach(url => { if(isShort(url)) renderVideo(container, url); });
  }

    container.innerHTML = '';
