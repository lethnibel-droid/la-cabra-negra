<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOAT GLOBAL ADS | Oficial</title>
    <style>
        :root {
            --glass: rgba(30, 30, 30, 0.8);
            --neon: #00ffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Roboto', sans-serif; height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        header {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .logo { font-weight: 900; color: white; text-shadow: 0 0 10px var(--neon); }
        .logo span { color: var(--neon); }

        /* --- CONTENEDOR DE PANTALLAS --- */
        .main-container { height: calc(100vh - 140px); overflow-y: auto; position: relative; }
        
        /* CADA SECCIÓN ES UNA PANTALLA PROPIA */
        .page { display: none; width: 100%; height: 100%; padding: 15px; }
        .page.active { display: block; }

        /* --- VIDEOS (Recuadro Negro Grande) --- */
        .video-card { background: #111; border: 1px solid var(--border); border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .video-info { padding: 12px; display: flex; gap: 10px; align-items: center; }
        .v-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--neon); }

        /* --- NAVEGACIÓN INFERIOR --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--glass); backdrop-filter: blur(15px); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-btn { text-align: center; color: #777; flex: 1; cursor: pointer; font-size: 10px; }
        .nav-btn.active { color: white; }
        .nav-btn i { font-size: 24px; display: block; font-style: normal; margin-bottom: 3px; }

        .btn-plus {
            width: 50px; height: 50px; background: #000; border: 2px solid var(--neon);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-top: -40px; box-shadow: 0 0 15px var(--neon);
        }

        /* --- MODAL DE SUBIDA --- */
        #modal-upload {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; flex-direction: column; justify-content: center; padding: 30px;
        }
        #modal-upload input { background: #222; border: 1px solid var(--neon); color: white; padding: 15px; border-radius: 10px; width: 100%; margin-bottom: 15px; }
        #modal-upload button { background: white; color: black; padding: 15px; border-radius: 10px; font-weight: bold; border: none; width: 100%; }
    </style>
</head>
<body>

        <div style="font-size: 20px;">🔍</div>
    </header>

    <div class="main-container">
        <section id="p-inicio" class="page active">

        </section>

        <section id="p-shorts" class="page">

            <p style="text-align: center; color: #555;">Contenido vertical próximamente...</p>
        </section>

        <section id="p-historial" class="page">
            <h2>🕒 Tu Historial</h2>
            <p style="color: #555;">Aquí verás los videos que has visto recientemente.</p>
        </section>

        <section id="p-perfil" class="page">
            <div style="text-align: center; padding-top: 30px;">
                <div style="width:90px; height:90px; border:2px solid var(--neon); border-radius:50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 35px; background: #111;">L</div>
                <h2 style="margin:0;">Lethnibel Ordóñez</h2>
                <p style="color:var(--neon);">Director Ejecutivo</p>
                
                <div style="background:var(--glass); padding:25px; border-radius:20px; margin-top:30px; border:1px solid var(--border);">
                    <p style="font-size:12px; color:#aaa;">BALANCE GOAT</p>
                    <h1 style="color:#00ff00; font-size:40px; margin:10px 0;">$1,250.00</h1>

    </div>

    <nav>
        <div class="nav-btn active" onclick="navegar('p-inicio', this)"><i>🏠</i>Inicio</div>
        <div class="nav-btn" onclick="navegar('p-shorts', this)"><i>🔥</i>Shorts</div>
        <div class="btn-plus" onclick="toggleModal(true)">+</div>
        <div class="nav-btn" onclick="navegar('p-historial', this)"><i>🕒</i>Historial</div>
        <div class="nav-btn" onclick="navegar('p-perfil', this)"><i>👤</i>Tú</div>
    </nav>

    <script>
        // --- FUNCIÓN PARA CAMBIAR DE PANTALLA ---
        function navegar(pantallaId, boton) {
            // Ocultar todas las páginas
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Quitar brillo a todos los botones
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Mostrar la seleccionada
            document.getElementById(pantallaId).classList.add('active');
            boton.classList.add('active');
        }

        // --- MANEJO DEL MODAL DE SUBIDA ---
        function toggleModal(show) {
            document.getElementById('modal-upload').style.display = show ? 'flex' : 'none';
        }
