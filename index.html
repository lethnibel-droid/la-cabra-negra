<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS - OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: -1;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .balance-badge {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid #00ff7f;
            color: #00ff7f;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 127, 0.2);
        }

        .whatsapp-btn {
            display: block;
            margin: 15px 20px;
            background: linear-gradient(45deg, #25d366, #128c7e);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
        }

        /* Cuadrícula YouTube PC (4x4) y Móvil (2x2) */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        @media (min-width: 900px) {
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* Tarjeta con Brillo Neón Finito */
        .video-card {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .video-card:hover {
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transform: translateY(-5px);
        }

        iframe { border: none; width: 100%; aspect-ratio: 16/9; display: block; }

        .video-info { padding: 10px; font-size: 0.85rem; }

        .social-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            font-size: 0.75rem;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .stat-item:hover { color: var(--neon-blue); }

        .shorts-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 20px;
            scrollbar-width: none;
        }

        .short-card {
            min-width: 130px;
            height: 220px;
            background: #111;
            border-radius: 15px;
            border: 1px solid var(--glass);
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Panel Admin Lethnibel */
        #admin-panel {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            margin: 15px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .admin-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--neon-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 0 20px var(--neon-purple);
            cursor: pointer;
            z-index: 1001;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div class="background"></div>

<div id="login-screen">
    <div class="logo" style="font-size: 3.5rem;">GOAT</div>
    <p style="color: #666; letter-spacing: 10px; margin-bottom: 40px;">GLOBAL ADS</p>
    <button onclick="login()" style="padding: 15px 50px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; background: white; color: black;">
        ENTRAR CON GOOGLE
    </button>
</div>

<header>
    <div class="logo">GOAT</div>
    <div id="u-balance" class="balance-badge">$0.00</div>
</header>

<div id="admin-panel">
    <h3 style="color: #ff4444; margin-top: 0; font-size: 0.9rem;">🛠️ PANEL DE CONTROL (ADMIN)</h3>
    <input type="text" id="target-id" class="admin-input" placeholder="Pegar ID del Usuario...">
    <div style="display: flex; gap: 8px;">
        <button onclick="updateBalance(1.00)" style="background: #25d366; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">+ $1.00</button>
        <button onclick="updateBalance(0.50)" style="background: #25d366; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">+ $0.50</button>
        <button onclick="resetBalance()" style="background: #ff4444; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer; color:white;">RESET</button>
    </div>
</div>

<a href="https://whatsapp.com/channel/0029Vb7nBB0BfxoBYiwrMt0G" target="_blank" class="whatsapp-btn">
    🛒 CANAL DE COMPRAS ($1 x 5 DÍAS)
</a>

<div style="padding: 10px 20px; color: #555; font-size: 0.8rem; font-weight: bold;">SECCIÓN SHORTS</div>
<div class="shorts-container">
    <div class="short-card"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" height="100%"></iframe></div>
    <div class="short-card"><iframe src="https://www.youtube.com/embed/jNQXAC9IVRw" height="100%"></iframe></div>
    <div class="short-card"><iframe src="https://www.youtube.com/embed/5PSL-WvNx70" height="100%"></iframe></div>
</div>

<div style="padding: 20px 20px 5px; font-weight: bold; color: var(--neon-blue);">MURO VIP</div>
<div class="video-grid" id="video-wall"></div>

<div class="fab" onclick="postVideo()">+</div>

<script>
    const ADMIN_EMAIL = "Lethnibel@gmail.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDh_u5eDv_fnSUXiDsHs-iJKZFgtOV3Jgw",
      authDomain: "flutter-ai-playground-93f86.firebaseapp.com",
      databaseURL: "https://flutter-ai-playground-93f86-default-rtdb.firebaseio.com/",
      projectId: "flutter-ai-playground-93f86",
      storageBucket: "flutter-ai-playground-93f86.firebasestorage.app",
      messagingSenderId: "912054292680",
      appId: "1:912054292680:web:80b3c73a7c669a061b95fd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function login() {
        auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then((res) => {
            document.getElementById('login-screen').style.display = 'none';
            if(res.user.email === ADMIN_EMAIL) document.getElementById('admin-panel').style.display = 'block';
            setupUser(res.user);
        });
    }

    function setupUser(user) {
        const ref = db.ref('users/' + user.uid);
        ref.on('value', (s) => {
            if (!s.exists()) ref.set({ balance: 0.00, email: user.email, name: user.displayName });
            else document.getElementById('u-balance').innerText = '$' + s.val().balance.toFixed(2);
        });
        loadVideos();
    }

    function loadVideos() {
        const wall = document.getElementById('video-wall');
        db.ref('videos').on('value', (s) => {
            wall.innerHTML = '';
            s.forEach((child) => {
                const v = child.val();
                const key = child.key;
                const views = v.views || Math.floor(Math.random() * 300) + 50;
                const likes = v.likes || 0;

                wall.innerHTML += `
                    <div class="video-card">
                        <iframe src="https://www.youtube.com/embed/${v.id}"></iframe>
                        <div class="video-info">
                            <strong style="color:var(--neon-blue);">VIP ADS ● ${v.user}</strong>
                        </div>
                        <div class="social-bar">
                            <div class="stat-item">👁️ ${views}</div>
                            <div class="stat-item" onclick="addLike('${key}')">❤️ ${likes}</div>
                            <div class="stat-item" onclick="shareVideo('${v.id}')">🔗 Compartir</div>
                        </div>
                    </div>`;
            });
            // Relleno automático
            ['4fndeDfaWCg', '5PSL-WvNx70', 'jNQXAC9IVRw'].forEach(id => {
                wall.innerHTML += `
                    <div class="video-card">
                        <iframe src="https://www.youtube.com/embed/${id}"></iframe>
                        <div class="video-info"><strong>RECOMENDADO</strong></div>
                        <div class="social-bar">
                            <div class="stat-item">👁️ ${Math.floor(Math.random()*500)}</div>
                            <div class="stat-item">❤️ ${Math.floor(Math.random()*100)}</div>
                            <div class="stat-item">🔗</div>
                        </div>
                    </div>`;
            });
        });
    }

    function addLike(key) {
        db.ref('videos/' + key + '/likes').transaction(c => (c || 0) + 1);
    }

    function shareVideo(id) {
        navigator.clipboard.writeText("https://www.youtube.com/watch?v=" + id);
        alert("¡Enlace copiado! Pásalo a tus grupos.");
    }

    function postVideo() {
        const link = prompt("Enlace de YouTube:");
        if(link) {
            const id = link.split('v=')[1] || link.split('/').pop();
            db.ref('videos').push({ id: id, user: auth.currentUser.displayName, views: 0, likes: 0 });
        }
    }

    function updateBalance(amt) {
        const id = document.getElementById('target-id').value;
        if(!id) return alert("Pega el ID del usuario primero");
        db.ref('users/' + id + '/balance').transaction(c => (c || 0) + amt);
    }

    function resetBalance() {
        const id = document.getElementById('target-id').value;
        if(confirm("¿Resetear saldo?")) db.ref('users/' + id + '/balance').set(0);
    }
</script>
</body>
</html>
