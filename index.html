<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOAT GLOBAL ADS</title>
    <style>
        :root {
            --bg-black: #0f0f0f;
            --neon-cyan: #00ffff;
            --yt-red: #ff0000;
            --gray-chip: #272727;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Roboto', sans-serif;
            height: 100%;
            overflow: hidden;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        #main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- HEADER (Basado en tu imagen) --- */
        header {
            background: var(--bg-black);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .logo-area span { color: var(--neon-cyan); }

        .header-tools {
            display: flex;
            gap: 20px;
            font-size: 20px;
        }

        /* --- BUSCADOR DESPLEGABLE --- */
        #search-bar {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            background: var(--bg-black);
            z-index: 200;
            align-items: center;
            padding: 0 15px;
        }

        #search-bar input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            outline: none;
        }

        /* --- CATEGORÍAS (CHIPS) --- */
        .chips-container {
            display: flex;
            gap: 10px;
            padding: 12px;
            overflow-x: auto;
            background: var(--bg-black);
            border-bottom: 1px solid #222;
        }

        .chips-container::-webkit-scrollbar { display: none; }

        .chip {
            background: var(--gray-chip);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }

        .chip.active { background: white; color: black; }

        /* --- ÁREA DE CONTENIDO (SCROLLABLE) --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
            -webkit-overflow-scrolling: touch;
        }

        .view { display: none; width: 100%; }
        .view.active { display: block; }

        /* --- TARJETAS DE VIDEO --- */
        .video-card { width: 100%; margin-bottom: 15px; }
        .player-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .video-details {
            display: flex;
            gap: 12px;
            padding: 12px;
        }

        .v-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--gray-chip);
            flex-shrink: 0;
        }

        .v-text h3 { margin: 0; font-size: 14px; font-weight: 500; line-height: 1.4; }
        .v-text p { margin: 4px 0 0; font-size: 12px; color: #aaa; }

        /* --- BARRA DE NAVEGACIÓN (BLINDADA) --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: var(--bg-black);
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 500;
        }

        .nav-btn {
            text-align: center;
            color: #aaa;
            font-size: 10px;
            flex: 1;
            cursor: pointer;
            padding: 10px 0;
        }

        .nav-btn.active { color: white; }
        .nav-btn i { font-size: 22px; display: block; margin-bottom: 4px; font-style: normal; }

        .add-circle {
            width: 45px; height: 45px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px;
            color: white;
            margin-top: -30px;
            background: #000;
        }

        /* --- MODAL PUBLICAR --- */
        #pub-modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
        }
        #pub-modal input {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="main-wrapper">
        
        <div id="search-bar">
            <span onclick="toggleSearch()" style="margin-right:15px; font-size:20px;">←</span>
            <input type="text" id="searchInput" placeholder="Buscar en GOAT Global..." onkeypress="if(event.key==='Enter') executeSearch()">
            <i onclick="executeSearch()" style="margin-left:15px;">🔍</i>
        </div>

        <header>
            <div class="logo-area">
                💎 GOAT <span>GLOBAL ADS</span>
            </div>
            <div class="header-tools">
                <i onclick="alert('Transmitiendo...')">📺</i>
                <i onclick="alert('Notificaciones')">🔔</i>
                <i onclick="toggleSearch()">🔍</i>
            </div>
        </header>

        <div class="chips-container">
            <div class="chip active" onclick="executeSearch('Estrategias Lethnibel')">Todo</div>
            <div class="chip" onclick="executeSearch('Nuevos Negocios')">Novedad</div>
            <div class="chip" onclick="executeSearch('Marketing Digital')">Marketing</div>
            <div class="chip" onclick="executeSearch('VIP')">VIP</div>
        </div>

        <div class="main-content">
            <section id="view-inicio" class="view active">
                <div id="video-feed">
                    </div>
            </section>

            <section id="view-perfil" class="view">
                <div style="text-align: center; padding: 40px 20px;">
                    <div style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon-cyan); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; background: #222;">L</div>
                    <h2 style="margin:0;">Lethnibel Ordóñez</h2>
                    <p style="color:#888;">Director Ejecutivo</p>
                    
                    <div style="background:#111; padding:25px; border-radius:15px; margin-top:30px; border:1px solid #222;">
                        <p style="font-size:11px; color:#aaa; letter-spacing:1px;">SALDO ACUMULADO</p>
                        <h3 style="color:#00ff00; font-size:32px; margin:10px 0;">$1,250.00</h3>
                    </div>
                </div>
            </section>
        </div>

        <div id="pub-modal">
            <h2 style="text-align:center;">Lanzar Campaña</h2>
            <input type="text" id="yt-url" placeholder="Pega el link de YouTube aquí">
            <button onclick="publish()" style="width:100%; background:white; color:black; padding:15px; border-radius:10px; font-weight:bold; border:none;">PUBLICAR</button>
            <p onclick="closeModal()" style="text-align:center; margin-top:20px; opacity:0.5;">Cancelar</p>
        </div>

        <nav>
            <div class="nav-btn active" onclick="switchTab('view-inicio', this)"><i>🏠</i>Inicio</div>
            <div class="nav-btn" onclick="alert('Shorts en camino')"><i>🔥</i>Shorts</div>
            
            <div class="add-circle" onclick="openModal()">+</div>
            
            <div class="nav-btn" onclick="alert('Historial de vistas')"><i>🕒</i>Suscripciones</div>
            <div class="nav-btn" onclick="switchTab('view-perfil', this)"><i>👤</i>Tú</div>
        </nav>

    </div>

    <script>
        // --- LÓGICA DE NAVEGACIÓN ---
        function switchTab(viewId, element) {
            // Ocultar todas las vistas
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            // Desactivar todos los botones
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Activar lo seleccionado
            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');
        }

        // --- LÓGICA DE BÚSQUEDA ---
        function toggleSearch() {
            const bar = document.getElementById('search-bar');
            bar.style.display = (bar.style.display === 'flex') ? 'none' : 'flex';
        }

        function executeSearch(queryManual = null) {
            const query = queryManual || document.getElementById('searchInput').value;
            const feed = document.getElementById('video-feed');
            
            if(!query) return;

            feed.innerHTML = <p style="text-align:center; padding:20px; color:var(--neon-cyan);">Sincronizando con YouTube: ${query}...</p>;
            
            setTimeout(() => {
                feed.innerHTML = "";
                for(let i=0; i<4; i++) {
                    const card = document.createElement('div');
                    card.className = "video-card";
                    card.innerHTML = `
                        <div class="player-wrap">
                            <iframe src="https://www.youtube.com/embed?listType=search&list=${query}&index=${i}&rel=0" allowfullscreen></iframe>
                        </div>
                        <div class="video-details">
                            <div class="v-avatar"></div>
                            <div class="v-text">
                                <h3>${query} - Video ${i+1}</h3>
                                <p>GOAT Global • YouTube Sync</p>
                            </div>
                        </div>`;
                    feed.appendChild(card);
                }
                if(!queryManual) toggleSearch();
            }, 600);
        }

        // --- LÓGICA DE PUBLICACIÓN ---
        function openModal() { document.getElementById('pub-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('pub-modal').style.display = 'none'; }

        function publish() {
            const url = document.getElementById('yt-url').value;
            if(!url) return;
            
            let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
            
            const card = document.createElement('div');
            card.className = "video-card";
            card.innerHTML = `
                <div class="player-wrap">
                    <iframe src="https://www.youtube.com/embed/${id}?rel=0" allowfullscreen></iframe>
                </div>
                <div class="video-details">
                    <div class="v-avatar" style="background:var(--neon-cyan)"></div>
                    <div class="v-text">
                        <h3>CAMPAÑA ACTIVA: ${id}</h3>
                        <p>Publicado por Director Ejecutivo • Recién</p>
                    </div>
                </div>`;
            
            document.getElementById('video-feed').prepend(card);
            closeModal();
            document.getElementById('yt-url').value = "";
            switchTab('view-inicio', document.querySelectorAll('.nav-btn')[0]);
        }

        // Carga inicial
        window.onload = () => executeSearch('Lethnibel Ordoñez Ads');
    </script>
</body>
</html>
