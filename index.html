<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="desbloquearAudio()">

    <header class="navbar efecto-glass">
        <div class="logo">GOAT GLOBAL ADS</div>
        <div class="header-right">
            <button class="btn-circular" onclick="abrirModal('modal-estetica')">🎨</button>
            <button id="btn-music" class="btn-circular" onclick="toggleMusica()">🎵</button>
            <button class="btn-ui" onclick="abrirModal('modal-login')">ACCEDER</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar efecto-glass">
            <div class="nav-item" onclick="location.reload()">🏠 Inicio</div>
            <div class="nav-item" onclick="abrirModal('modal-subir')">📤 Publicar</div>
            <div class="nav-item">📊 Panel Pro</div>
            <div class="stats-box">
                <p>👤 Usuarios: <span id="u-count">1.2k</span></p>
                <p>📺 Anuncios: <span id="a-count">450</span></p>
            </div>
        </aside>

        <main class="feed">
            <section class="stories" id="stories-area">
                <div class="story-add">+</div>
                <div class="story-circle"></div>
                <div class="story-circle"></div>
            </section>

            <div id="grid-videos" class="video-grid">
                </div>
        </main>
    </div>

    <div id="modal-subir" class="modal">
        <div class="modal-content efecto-glass">
            <h3>Lanzar Campaña</h3>
            <input type="text" id="v-titulo" placeholder="Título del Anuncio">
            <input type="text" id="v-url" placeholder="URL de YouTube">
            <input type="text" id="v-social" placeholder="Link Red Social">
            <button class="btn-ui" onclick="motorPublicar()">PUBLICAR</button>
            <button class="btn-txt" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>

    <div id="modal-estetica" class="modal">
        <div class="modal-content efecto-glass">
            <h3>Ilusión Visual</h3>
            <div class="picker">
                <div class="dot azul" onclick="cambiarTema('#00d2ff','azul')"></div>
                <div class="dot rojo" onclick="cambiarTema('#ff004c','rojo')"></div>
                <div class="dot morado" onclick="cambiarTema('#bc00ff','morado')"></div>
            </div>
            <button class="btn-txt" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>

    <audio id="audio-azul" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<audio id="audio-rojo" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>
<audio id="audio-morado" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
<link rel="stylesheet" href="style.css?v=2">
aside class="sidebar efecto-glass">
    <nav>
        <div class="nav-item" onclick="window.location.reload()">🏠 Inicio</div>
        
        <div class="nav-item" onclick="abrirModal('modal-subir')">📤 Publicar</div>
        
        <div class="nav-item" onclick="alert('Panel Pro: Disponible en la versión 2026')">📈 Panel Pro</div>
        
        <hr style="margin:15px 0; opacity:0.1;">
        
        <div class="stats-global">
            <p>👥 Usuarios: <span id="count-users">1,240</span></p>
            <p>📺 Anuncios: <span id="count-ads">0</span></p>
        </div>
    </nav>
</aside>
