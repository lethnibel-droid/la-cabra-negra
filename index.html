<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOAT GLOBAL ADS | Lethnibel Ordóñez</title>
    <style>
        :root {
            --bg-dark: #000000;
            --header-bg: #0f0f0f;
            --neon-diamond: #00ffff;
            --chip-bg: #272727;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* --- HEADER YOUTUBE STYLE --- */
        header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid #222;
        }

        .logo-section { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 17px; }
        .logo-icon { color: var(--neon-diamond); font-size: 22px; }

        .header-icons { display: flex; align-items: center; gap: 18px; }
        .header-icons i { font-size: 20px; cursor: pointer; font-style: normal; }

        /* --- BUSCADOR --- */
        #search-box {
            display: none; background: var(--header-bg); padding: 10px;
            position: absolute; top: 0; left: 0; width: 100%;
            z-index: 3000; align-items: center; gap: 10px;
        }
        #search-box input {
            flex: 1; background: #222; border: 1px solid #444; color: white;
            padding: 10px 15px; border-radius: 20px; outline: none;
        }

        /* --- CHIPS --- */
        .categories-bar {
            background: var(--header-bg); padding: 10px;
            display: flex; gap: 10px; overflow-x: auto;
            border-bottom: 1px solid #222;
        }
        .categories-bar::-webkit-scrollbar { display: none; }
        .chip { background: var(--chip-bg); padding: 7px 14px; border-radius: 8px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .chip.active { background: white; color: black; }

        /* --- CONTENIDO --- */
        .content-area { height: calc(100vh - 150px); overflow-y: auto; padding-bottom: 90px; }
        .view-section { display: none; padding: 10px; }
        .view-section.active { display: block; }

        /* --- TARJETAS DE VIDEO --- */
        .yt-card { width: 100%; margin-bottom: 25px; background: #000; }
        .video-container { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background: #1a1a1a; border-radius: 12px; overflow: hidden;
        }
        .video-container iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        .video-meta { display: flex; gap: 12px; padding: 12px 5px; }
        .avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; flex-shrink: 0; }
        .meta-text h3 { margin: 0; font-size: 14px; font-weight: 500; color: #fff; }

        /* --- NAV INFERIOR --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--header-bg); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { text-align: center; color: #888; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-item.active { color: white; }
        .nav-item span { font-size: 20px; display: block; }

        .btn-plus {
            width: 45px; height: 45px; background: #222; border: 2px solid var(--neon-diamond);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: white; margin-top: -30px;
        }

        #modal-pub {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; flex-direction: column; justify-content: center; padding: 30px;
        }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .btn-confirm { background: white; color: black; padding: 15px; border-radius: 12px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <div id="search-box">
        <span onclick="toggleSearch()" style="cursor:pointer">←</span>
        <input type="text" id="query" placeholder="Buscar en YouTube..." onkeypress="if(event.key === 'Enter') buscarYoutube()">
        <button onclick="buscarYoutube()" style="background:none; border:none; color:var(--neon-diamond); font-weight:bold;">IR</button>
    </div>

    <header id="main-header">
        <div class="logo-section">
            <span class="logo-icon">💎</span>
            <span>GOAT GLOBAL ADS</span>
        </div>
        <div class="header-icons">
            <i>📺</i>
            <i>🔔</i>
            <i onclick="toggleSearch()">🔍</i>
        </div>
    </header>

    <div class="categories-bar">
        <div class="chip active" onclick="buscarYoutube('Marketing')">Todo</div>
        <div class="chip" onclick="buscarYoutube('Musica')">Música</div>
        <div class="chip" onclick="buscarYoutube('Exito')">VIP</div>
    </div>

    <div class="content-area">
        <section id="inicio" class="view-section active">
            <div id="feed"></div>
        </section>

        <section id="perfil" class="view-section">
            <div style="text-align:center; padding:40px;">
                <div style="width:80px; height:80px; border:2px solid var(--neon-diamond); border-radius:50%; margin:0 auto; font-size:30px; display:flex; align-items:center; justify-content:center;">L</div>
                <h2>Lethnibel Ordóñez</h2>
                <div style="background:#111; padding:20px; border-radius:15px; margin-top:20px;">
                    <p>SALDO ACUMULADO</p>
                    <h3 style="color:#00ff00; font-size:24px;">$1,250.00</h3>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-pub">
        <h2 style="text-align:center">Publicar Campaña</h2>
        <input type="text" id="video-url" placeholder="Pega el link de YouTube">
        <button class="btn-confirm" onclick="publicar()">LANZAR</button>
        <p onclick="cerrarModal()" style="text-align:center; margin-top:20px; opacity:0.5; cursor:pointer;">Cancelar</p>
    </div>

    <nav>
        <div class="nav-item active" onclick="navegar('inicio', this)"><span>🏠</span>Inicio</div>
        <div class="nav-item"><span>🔥</span>Shorts</div>
        <div class="btn-plus" onclick="abrirModal()">+</div>
        <div class="nav-item"><span>🕒</span>Historial</div>
        <div class="nav-item" onclick="navegar('perfil', this)"><span>👤</span>Tú</div>
    </nav>

    <script>
        function navegar(id, elemento) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            elemento.classList.add('active');
        }

        function toggleSearch() {
            const box = document.getElementById('search-box');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        function buscarYoutube(manualQuery = null) {
            const query = manualQuery || document.getElementById('query').value;
            const feed = document.getElementById('feed');
            if(!query) return;
            feed.innerHTML = <p style="text-align:center; padding:20px;">Buscando en YouTube...</p>;
            setTimeout(() => {
                feed.innerHTML = "";
                for(let i=0; i<4; i++) {
                    const card = document.createElement('div');
                    card.className = "yt-card";
                    card.innerHTML = `<div class="video-container"><iframe src="https://www.youtube.com/embed?listType=search&list=${query}&index=${i}"></iframe></div>
                    <div class="video-meta"><div class="avatar"></div><div class="meta-text"><h3>${query} - Video ${i+1}</h3><p>GOAT Ads View</p></div></div>`;
                    feed.appendChild(card);
                }
                if(!manualQuery) toggleSearch();
            }, 500);
        }

        function abrirModal() { document.getElementById('modal-pub').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-pub').style.display = 'none'; }
