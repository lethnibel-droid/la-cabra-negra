<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT GLOBAL ADS - Versión Final Profesional</title>

<!-- Firebase SDK Compat -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
/* ========================== VARIABLES NEÓN ========================== */
:root {
    --neon-blue: #00f2ff;
    --neon-purple: #bc13fe;
    --bg-color: #000;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.2);
    --font-family: 'Inter', 'Arial', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: var(--font-family);
}

body {
    background-color: var(--bg-color);
    color: var(--neon-blue);
}

/* ========================== NAVEGACIÓN SPA ========================== */
nav {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 1rem;
    background: var(--glass-bg);
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
}

nav button {
    background: none;
    border: 1px solid var(--neon-blue);
    color: var(--neon-blue);
    padding: 0.5rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

nav button:hover {
    background-color: var(--neon-purple);
    border-color: var(--neon-purple);
}

/* ========================== CONTENIDO ========================== */
.tab-content {
    display: none;
    padding: 1rem;
}

.tab-content.active {
    display: block;
}

/* ========================== TARJETAS GLASSMORPHISM ========================== */
.card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    padding: 1rem;
    margin: 1rem 0;
    backdrop-filter: blur(10px);
}

/* ========================== BOTONES ========================== */
button.primary {
    background-color: var(--neon-blue);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    color: #000;
    cursor: pointer;
    margin: 0.5rem 0;
}

button.primary:hover {
    background-color: var(--neon-purple);
}

/* ========================== RESPONSIVE ========================== */
@media (max-width: 768px) {
    nav {
        flex-direction: column;
    }
}

/* ========================== MENÚ CHAT PROFESIONAL ========================== */
#chatContainer {
    display: flex;
    height: 100vh;
    background-color: #0b0d0e;
    overflow: hidden;
}

/* Sidebar */
#chatSidebar {
    width: 260px;
    background: rgba(255,255,255,0.05);
    border-right: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    transition: width 0.3s ease;
}

#chatSidebar.collapsed {
    width: 60px;
}

#newChatBtn {
    margin: 1rem;
    padding: 0.5rem;
    border: 1px solid var(--neon-blue);
    border-radius: 15px;
    background: none;
    color: var(--neon-blue);
    cursor: pointer;
    transition: 0.3s;
}

#newChatBtn:hover {
    background-color: var(--neon-purple);
    border-color: var(--neon-purple);
}

/* Historial de chats */
#chatHistory {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
}

#chatHistory::-webkit-scrollbar {
    width: 0;
}

.chatItem {
    padding: 0.5rem;
    border-radius: 10px;
    margin-bottom: 0.5rem;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: 0.3s;
}

.chatItem:hover {
    background-color: var(--neon-blue);
    color: #000;
}

/* Footer perfil */
#chatSidebarFooter {
    padding: 1rem;
    border-top: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* Área de mensajes */
#chatMain {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

#messageArea {
    flex: 1;
    padding: 1rem;
    overflow-y: auto;
}

.message {
    padding: 0.5rem 1rem;
    margin-bottom: 0.5rem;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    max-width: 70%;
    transition: 0.3s;
}

.message.user {
    background: var(--neon-blue);
    color: #000;
    margin-left: auto;
}

/* Input box */
#chatInputContainer {
    display: flex;
    justify-content: center;
    padding: 1rem;
    border-top: 1px solid rgba(255,255,255,0.2);
}

#chatInput {
    width: 100%;
    max-width: 800px;
    padding: 0.75rem 1rem;
    border-radius: 50px;
    border: 1px solid var(--neon-blue);
    outline: none;
    background: rgba(255,255,255,0.05);
    color: var(--neon-blue);
}

#sendBtn {
    margin-left: 0.5rem;
    padding: 0 1rem;
    border-radius: 50px;
    border: none;
    background: var(--neon-blue);
    cursor: pointer;
    transition: 0.3s;
}

#sendBtn:hover {
    background-color: var(--neon-purple);
}

/* Scroll auto */
#messageArea {
    scroll-behavior: smooth;
}
</style>
</head>
<body>

<!-- ========================== NAVEGACIÓN ========================== -->
<nav>
    <button data-tab="home">Inicio</button>
    <button data-tab="shorts">Shorts</button>
    <button data-tab="panel">Mi Panel</button>
    <button data-tab="director">Director</button>
    <button id="loginBtn">Login con Google</button>
    <button id="logoutBtn" style="display:none;">Cerrar Sesión</button>
</nav>

<!-- ========================== CONTENIDO SPA ========================== -->
<div id="home" class="tab-content active">
    <h2>Muro VIP</h2>
    <div id="videoFeed"></div>
</div>

<div id="shorts" class="tab-content">
    <h2>Shorts</h2>
    <div id="shortsFeed"></div>
</div>

<div id="panel" class="tab-content">
    <h2>Mi Panel</h2>
    <div id="userVideos"></div>
    <h3>Publicar Video</h3>
    <input type="text" id="videoUrl" placeholder="URL de YouTube" style="width:80%;">
    <button class="primary" id="publishBtn">Publicar</button>
</div>

<div id="director" class="tab-content">
    <h2>Panel Director</h2>
    <input type="text" id="searchUid" placeholder="Buscar por UID">
    <button class="primary" id="searchUserBtn">Buscar Usuario</button>
    <div id="adminControls"></div>
</div>

<!-- ========================== CHAT PROFESIONAL ========================== -->
<div id="chatContainer">
    <div id="chatSidebar">
        <button id="newChatBtn">Nuevo Chat</button>
        <div id="chatHistory">
            <div class="chatItem">Chat 1</div>
            <div class="chatItem">Chat 2</div>
            <div class="chatItem">Chat Largo de Prueba para truncar...</div>
        </div>
        <div id="chatSidebarFooter">
            <span>Usuario</span>
            <button class="primary">⚙️</button>
        </div>
    </div>
    <div id="chatMain">
        <div id="messageArea">
