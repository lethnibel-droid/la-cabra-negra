<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOAT GLOBAL ADS | FINAL</title>
    <style>
        :root {
            --glass: rgba(20, 20, 20, 0.85);
            --neon: #00ffff;
            --border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Roboto', sans-serif; height: 100vh; overflow: hidden; }

        /* --- HEADER GLASS --- */
        header {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); z-index: 1000; position: relative;
        }
        .logo { font-weight: 900; font-size: 18px; text-shadow: 0 0 10px var(--neon); }
        .logo span { color: var(--neon); }

        /* --- CONTENEDOR DE PANTALLAS --- */
        #app-content { height: calc(100vh - 140px); overflow-y: auto; position: relative; background: #000; }
        
        .view { display: none; width: 100%; padding: 15px; min-height: 100%; }
        .view.active { display: block; }

        /* --- TARJETAS DE VIDEO (EL RECUADRO NEGRO) --- */
        .video-card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 18px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .video-meta { padding: 15px; display: flex; gap: 12px; align-items: center; background: rgba(255,255,255,0.02); }
        .v-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* --- NAVEGACIÓN INFERIOR (GLASS) --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-btn { text-align: center; color: #555; flex: 1; cursor: pointer; transition: 0.2s; font-size: 10px; font-weight: bold; }
        .nav-btn.active { color: white; transform: scale(1.05); }
        .nav-btn i { font-size: 24px; display: block; font-style: normal; margin-bottom: 4px; }

        .btn-plus {
            width: 55px; height: 55px; background: #000; border: 2px solid var(--neon);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 32px; color: white; margin-top: -45px; box-shadow: 0 0 20px rgba(0,255,255,0.4);
        }

        /* --- MODAL PUBLICAR --- */
        #modal-pub {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; flex-direction: column; justify-content: center; padding: 40px;
        }
        #modal-pub input { background: #111; border: 1px solid var(--neon); color: white; padding: 18px; border-radius: 12px; width: 100%; margin-bottom: 15px; font-size: 16px; outline: none; }
        #modal-pub button { background: white; color: black; padding: 18px; border-radius: 12px; font-weight: bold; border: none; width: 100%; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">💎 GOAT <span>GLOBAL ADS</span></div>
        <div style="font-size: 20px; display: flex; gap: 20px;">
            <i onclick="alert('Notificaciones vacías')">🔔</i>
            <i onclick="alert('Buscador activo')">🔍</i>
        </div>
    </header>

    <div id="app-content">
        <section id="view-inicio" class="view active">
            <div id="main-feed">
                </div>
        </section>

        <section id="view-shorts" class="view">
            <h2 style="text-align: center;">🔥 GOAT SHORTS</h2>
            <div id="shorts-feed"></div>
        </section>

        <section id="view-perfil" class="view">
            <div style="text-align: center; padding-top: 40px;">
                <div style="width:100px; height:100px; border:2px solid var(--neon); border-radius:50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #111; box-shadow: 0 0 20px rgba(0,255,255,0.2);">L</div>
                <h2 style="margin:0;">Lethnibel Ordóñez</h2>
                <p style="color:var(--neon); font-size: 14px; letter-spacing: 1px;">DIRECTOR EJECUTIVO</p>
                
                <div style="background:var(--glass); padding:30px; border-radius:25px; margin-top:40px; border:1px solid var(--border); backdrop-filter: blur(10px);">
                    <p style="font-size:12px; color:#888; margin-bottom: 10px;">MI BALANCE DISPONIBLE</p>
                    <h1 style="color:#00ff00; font-size:48px; margin:0;">$1,250.00</h1>
                </div>
            </div>
        </section>
    </div>

    <div id="modal-pub">
        <h2 style="text-align:center; margin-bottom: 20px;">Subir Campaña Global</h2>
        <input type="text" id="yt-link" placeholder="Pega el link de YouTube aquí">
        <button onclick="subirVideo()">PUBLICAR AHORA</button>
        <p onclick="cerrarModal()" style="text-align:center; margin-top:30px; opacity:0.5; cursor:pointer;">Cancelar y volver</p>
    </div>

    <nav>
        <div class="nav-btn active" onclick="cambiarPantalla('view-inicio', this)"><i>🏠</i>Inicio</div>
        <div class="nav-btn" onclick="cambiarPantalla('view-shorts', this)"><i>🔥</i>Shorts</div>
        <div class="btn-plus" onclick="abrirModal()">+</div>
        <div class="nav-btn" onclick="alert('Historial pronto')"><i>🕒</i>Suscripciones</div>
        <div class="nav-btn" onclick="cambiarPantalla('view-perfil', this)"><i>👤</i>Tú</div>
    </nav>

    <script>
        // --- MOTOR DE NAVEGACIÓN ---
        function cambiarPantalla(pantallaId, boton) {
            // Ocultar todas las pantallas
            const pantallas = document.querySelectorAll('.view');
            pantallas.forEach(p => p.classList.remove('active'));
            
            // Desactivar todos los botones
            const botones = document.querySelectorAll('.nav-btn');
            botones.forEach(b => b.classList.remove('active'));
            
            // Activar lo seleccionado
            document.getElementById(pantallaId).classList.add('active');
            boton.classList.add('active');
        }

        // --- MOTOR DE MODAL ---
        function abrirModal() { document.getElementById('modal-pub').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-pub').style.display = 'none'; }

        // --- MOTOR DE PUBLICACIÓN REAL ---
        function subirVideo() {
            const link = document.getElementById('yt-link').value;
            if(!link) return;

            // Extraer ID de YouTube de cualquier formato
            let videoId = "";
            try {
                if(link.includes('v=')) {
                    videoId = link.split('v=')[1].split('&')[0];
                } else if(link.includes('youtu.be/')) {
                    videoId = link.split('youtu.be/')[1].split('?')[0];
                } else {
                    videoId = link.split('/').pop().split('?')[0];
                }
            } catch(e) {
                alert("Link no reconocido");
                return;
            }

            const feed = document.getElementById('main-feed');
            const card = document.createElement('div');
            card.className = "video-card";
            card.innerHTML = `
                <div class="video-box">
                    <iframe src="https://www.youtube.com/embed/${videoId}?rel=0" allowfullscreen></iframe>
                </div>
                <div class="video-meta">
                    <div class="v-avatar"></div>
                    <div>
                        <h3 style="margin:0; font-size:14px;">Anuncio de Campaña Activo</h3>
                        <p style="margin:4px 0 0; font-size:11px; color:#888;">Publicado por: Lethnibel Ordóñez • Ahora mismo</p>
                    </div>
                </div>
            `;

            feed.prepend(card); // Ponerlo al principio
            document.getElementById('yt-link').value = ""; // Limpiar input
            cerrarModal(); // Cerrar ventana
            cambiarPantalla('view-inicio', document.querySelectorAll('.nav-btn')[0]); // Volver al inicio
        }

        // Cargar video de bienvenida
        window.onload = () => {
            subirVideoManual('YlEK3J076-U', 'Bienvenido a GOAT GLOBAL ADS');
        };

        function subirVideoManual(id, titulo) {
            const feed = document.getElementById('main-feed');
            const card = document.createElement('div');
            card.className = "video-card";
            card.innerHTML = <div class="video-box"><iframe src="https://www.youtube.com/embed/${id}"></iframe></div><div class="video-meta"><div class="v-avatar"></div><div><h3>${titulo}</h3><p>GOAT Official • 2026</p></div></div>;
            feed.appendChild(card);
        }
    </script>
</body>
</html>
