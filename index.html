<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS - DIRECTOR</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff7f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
        }

        .balance-badge {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .search-area { padding: 10px 20px; }
        #main-search {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #111;
            color: white;
            box-sizing: border-box;
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tag {
            background: #222;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            border: 1px solid #333;
            white-space: nowrap;
            cursor: pointer;
        }
        .tag.active { background: white; color: black; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }
        @media (min-width: 900px) { .video-grid { grid-template-columns: repeat(4, 1fr); } }

        .video-card {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid var(--glass);
            position: relative;
        }

        iframe { border: none; width: 100%; aspect-ratio: 16/9; }
        .short-iframe { aspect-ratio: 9/16; }

        .video-info { padding: 10px; font-size: 0.8rem; }
        
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        #admin-panel {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid #ff4444;
            margin: 15px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .admin-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .admin-btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }

        .fab {
            position: fixed; bottom: 20px; right: 20px;
            width: 55px; height: 55px; background: var(--neon-purple);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 25px; cursor: pointer; z-index: 1001;
        }

        #login-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo" style="font-size: 3rem;">GOAT</div>
    <button onclick="login()" style="margin-top:20px; padding: 15px 40px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; background: white; color: black;">
        INICIAR SESIÓN CON GOOGLE
    </button>
</div>

<header>
    <div class="logo">GOAT</div>
    <div id="u-balance" class="balance-badge">$0.00</div>
</header>

<div class="search-area">
    <input type="text" id="main-search" placeholder="🔍 Buscar videos o usuarios..." onkeyup="filterContent()">
</div>

<div class="filter-tags">
    <div class="tag active" onclick="setFilter('all')">Todo</div>
    <div class="tag" onclick="setFilter('video')">Videos</div>
    <div class="tag" onclick="setFilter('short')">Shorts</div>
    <div class="tag" onclick="setFilter('vip')">Inversiones VIP</div>
</div>

<div id="admin-panel">
    <h3 style="color: #ff4444; margin: 0 0 10px 0; font-size: 0.9rem;">🛠️ GESTIÓN DE DIRECTOR (LETHNIBEL)</h3>
    <input type="text" id="target-id" style="width:100%; padding:10px; background:#111; color:white; border:1px solid #444; border-radius:5px;" placeholder="Pega el ID del Usuario aquí...">
    <div class="admin-controls">
        <button class="admin-btn" style="background:#25d366;" onclick="modificarSaldo(1.00)">+ $1.00</button>
        <button class="admin-btn" style="background:#25d366;" onclick="modificarSaldo(5.00)">+ $5.00</button>
        <button class="admin-btn" style="background:#ff4444; color:white;" onclick="modificarSaldo(-1.00)">- $1.00</button>
        <button class="admin-btn" style="background:#444; color:white;" onclick="verUsuarios()">👥 Ver Usuarios/IDs</button>
    </div>
</div>

<div class="video-grid" id="main-wall"></div>

<div class="fab" onclick="postContenido()">+</div>

<script>
    const ADMIN_EMAIL = "Lethnibel@gmail.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDh_u5eDv_fnSUXiDsHs-iJKZFgtOV3Jgw",
      authDomain: "flutter-ai-playground-93f86.firebaseapp.com",
      databaseURL: "https://flutter-ai-playground-93f86-default-rtdb.firebaseio.com/",
      projectId: "flutter-ai-playground-93f86",
      storageBucket: "flutter-ai-playground-93f86.firebasestorage.app",
      messagingSenderId: "912054292680",
      appId: "1:912054292680:web:80b3c73a7c669a061b95fd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let esAdmin = false;

    // Persistencia y Escuchador de Sesión
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            if(user.email === ADMIN_EMAIL) {
                esAdmin = true;
                document.getElementById('admin-panel').style.display = 'block';
            }
            setupUser(user);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    function login() {
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
            const provider = new firebase.auth.GoogleAuthProvider();
            return auth.signInWithRedirect(provider);
        });
    }

    function setupUser(user) {
        const ref = db.ref('users/' + user.uid);
        ref.on('value', (s) => {
            if (!s.exists()) ref.set({ balance: 0.00, email: user.email, name: user.displayName, uid: user.uid });
            else document.getElementById('u-balance').innerText = '$' + s.val().balance.toFixed(2);
        });
        loadContent();
    }

    function loadContent() {
        const wall = document.getElementById('main-wall');
        db.ref('videos').on('value', (s) => {
            wall.innerHTML = '';
            s.forEach((child) => {
                const v = child.val();
                const key = child.key;
                const isShort = v.tipo === 'short';
                wall.innerHTML += `
                    <div class="video-card" data-tipo="${v.tipo || 'video'}">
                        <iframe class="${isShort ? 'short-iframe' : ''}" src="https://www.youtube.com/embed/${v.id}"></iframe>
                        <div class="video-info">
                            <strong style="color:var(--neon-blue);">${v.titulo || 'VIP ADS'}</strong><br>
                            <small>Por: ${v.user}</small>
                            ${esAdmin ? <button class="delete-btn" style="margin-top:5px;" onclick="eliminarVideo('${key}')">❌ Eliminar</button> : ''}
                        </div>
                    </div>`;
            });
        });
    }

    function postContenido() {
        const tipo = confirm("¿Es un YouTube SHORT? (Aceptar = SHORT / Cancelar = VIDEO)") ? 'short' : 'video';
        const titulo = prompt("Título del Proyecto:");
        const link = prompt("Link de YouTube:");
        if(link && titulo) {
            const id = link.split('v=')[1] || link.split('/').pop().split('?')[0];
            db.ref('videos').push({ id: id, titulo: titulo, tipo: tipo, user: auth.currentUser.displayName });
        }
    }

    function modificarSaldo(amt) {
        const userId = document.getElementById('target-id').value.trim();
        if(!userId) return alert("Pega el ID del usuario primero");
        db.ref('users/' + userId + '/balance').transaction(c => (c || 0) + amt);
    }

    function eliminarVideo(key) {
        if(confirm("¿Seguro que quieres borrarlo?")) db.ref('videos/' + key).remove();
    }

    function verUsuarios() {
        db.ref('users').once('value', (s) => {
            let lista = "LISTA DE USUARIOS (Copia el ID):\n\n";
            s.forEach(u => { lista += ${u.val().name} | Saldo: $${u.val().balance.toFixed(2)} | ID: ${u.key}\n\n; });
            alert(lista);
        });
    }

    function filterContent() {
        const query = document.getElementById('main-search').value.toLowerCase();
        document.querySelectorAll('.video-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(query) ? 'block' : 'none';
        });
    }

    function setFilter(tipo) {
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.video-card').forEach(card => {
            if(tipo === 'all') card.style.display = 'block';
            else card.style.display = card.getAttribute('data-tipo') === tipo ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
