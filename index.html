<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS - OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff7f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVEGACIÓN Y MENÚ --- */
        header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            padding: 10px;
            overflow-x: auto;
            background: #050505;
            scrollbar-width: none;
        }

        .nav-item {
            padding: 8px 15px;
            background: #111;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #222;
        }

        .nav-item.active { background: white; color: black; font-weight: bold; }

        /* --- SECCIONES --- */
        .page-section { display: none; padding: 15px; }
        .page-section.active { display: block; }

        .balance-badge {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* --- GRIDS DE VIDEOS --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 900px) {
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 0.5px solid var(--glass);
            position: relative;
        }

        iframe { border: none; width: 100%; aspect-ratio: 16/9; display: block; }
        .short-iframe { aspect-ratio: 9/16; }

        .video-info { padding: 10px; font-size: 0.8rem; }

        /* --- PANEL ADMIN --- */
        #admin-panel {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid #ff4444;
            margin: 15px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .admin-input {
            width: 100%; padding: 10px; margin-bottom: 10px;
            background: #111; border: 1px solid #333; color: white; border-radius: 8px;
        }

        .fab {
            position: fixed; bottom: 25px; right: 25px;
            width: 55px; height: 55px; background: var(--neon-purple);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 25px; box-shadow: 0 0 15px var(--neon-purple);
            cursor: pointer; z-index: 1001;
        }

        #login-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo" style="font-size: 3rem; margin-bottom: 10px;">GOAT</div>
    <p style="color: #444; letter-spacing: 5px; margin-bottom: 30px;">GLOBAL ADS</p>
    <button onclick="login()" style="padding: 12px 40px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; background: white; color: black;">
        ENTRAR CON GOOGLE
    </button>
</div>

<header>
    <div class="logo">GOAT</div>
    <div id="u-balance" class="balance-badge">$0.00</div>
</header>

<div class="nav-menu">
    <div class="nav-item active" onclick="showSection('home', this)">Inicio</div>
    <div class="nav-item" onclick="showSection('shorts', this)">Shorts</div>
    <div class="nav-item" onclick="showSection('history', this)">Mi Historial</div>
    <div class="nav-item" onclick="showSection('admin', this)" id="admin-tab" style="display:none; color: #ff4444;">Admin</div>
</div>

<div id="home" class="page-section active">
    <div style="padding: 10px 0; font-weight: bold; color: var(--neon-blue);">MURO VIP</div>
    <div class="video-grid" id="video-wall"></div>
</div>

<div id="shorts" class="page-section">
    <div style="padding: 10px 0; font-weight: bold; color: var(--neon-purple);">SHORTS DESTACADOS</div>
    <div class="video-grid" id="shorts-wall" style="grid-template-columns: repeat(2, 1fr);"></div>
</div>

<div id="history" class="page-section">
    <div style="padding: 10px 0; font-weight: bold;">MIS PUBLICACIONES</div>
    <div id="user-history" class="video-grid"></div>
</div>

<div id="admin" class="page-section">
    <div id="admin-panel" style="display: block; margin: 0;">
        <h3 style="color: #ff4444; margin-top: 0;">🛠️ DIRECTOR CONTROL</h3>
        <input type="text" id="target-id" class="admin-input" placeholder="ID del Usuario...">
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button onclick="updateBalance(1.00)" style="background: #25d366; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">+ $1.00</button>
            <button onclick="updateBalance(5.00)" style="background: #25d366; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">+ $5.00</button>
            <button onclick="resetBalance()" style="background: #ff4444; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; color:white;">RESET</button>
            <button onclick="verUsuarios()" style="background: #444; border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer; color:white;">VER USUARIOS</button>
        </div>
    </div>
</div>

<div class="fab" onclick="postContenido()">+</div>

<script>
    const ADMIN_EMAIL = "Lethnibel@gmail.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDh_u5eDv_fnSUXiDsHs-iJKZFgtOV3Jgw",
      authDomain: "flutter-ai-playground-93f86.firebaseapp.com",
      databaseURL: "https://flutter-ai-playground-93f86-default-rtdb.firebaseio.com/",
      projectId: "flutter-ai-playground-93f86",
      storageBucket: "flutter-ai-playground-93f86.firebasestorage.app",
      messagingSenderId: "912054292680",
      appId: "1:912054292680:web:80b3c73a7c669a061b95fd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- MANEJO DE SESIÓN ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            if(user.email === ADMIN_EMAIL) {
                document.getElementById('admin-tab').style.display = 'block';
            }
            setupUser(user);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    function login() {
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
            const provider = new firebase.auth.GoogleAuthProvider();
            return auth.signInWithPopup(provider);
        });
    }

    function setupUser(user) {
        const ref = db.ref('users/' + user.uid);
        ref.on('value', (s) => {
            if (!s.exists()) ref.set({ balance: 0.00, email: user.email, name: user.displayName, uid: user.uid });
            else document.getElementById('u-balance').innerText = '$' + s.val().balance.toFixed(2);
        });
        loadContent();
    }

    function showSection(id, el) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function loadContent() {
        const wall = document.getElementById('video-wall');
        const shortsWall = document.getElementById('shorts-wall');
        const historyWall = document.getElementById('user-history');

        db.ref('videos').on('value', (s) => {
            wall.innerHTML = '';
            shortsWall.innerHTML = '';
            historyWall.innerHTML = '';

            s.forEach((child) => {
                const v = child.val();
                const key = child.key;
                const isShort = v.tipo === 'short';
                
                const html = `
                    <div class="video-card">
                        <iframe class="${isShort ? 'short-iframe' : ''}" src="https://www.youtube.com/embed/${v.id}"></iframe>
                        <div class="video-info">
                            <strong style="color:var(--neon-blue);">${v.titulo || 'VIP ADS'}</strong><br>
                            <small>Por: ${v.user}</small>
                        </div>
                    </div>`;

                if(isShort) shortsWall.innerHTML += html;
                else wall.innerHTML += html;

                if(v.uid === auth.currentUser.uid) historyWall.innerHTML += html;
            });
        });
    }

    function postContenido() {
        const tipo = confirm("¿Es un YouTube SHORT? (Aceptar = SHORT / Cancelar = VIDEO)") ? 'short' : 'video';
        const titulo = prompt("Título del Proyecto:");
        const link = prompt("Enlace de YouTube:");
        
        if(link && titulo) {
            const id = link.split('v=')[1] || link.split('/').pop().split('?')[0];
            db.ref('videos').push({
                id: id,
                titulo: titulo,
                tipo: tipo,
                user: auth.currentUser.displayName,
                uid: auth.currentUser.uid,
                date: new Date().getTime()
            });
        }
    }

    // --- FUNCIONES ADMIN ---
    function updateBalance(amt) {
        const id = document.getElementById('target-id').value;
        if(!id) return alert("Pega el ID del usuario");
        db.ref('users/' + id + '/balance').transaction(c => (c || 0) + amt);
    }

    function resetBalance() {
        const id = document.getElementById('target-id').value;
        if(confirm("¿Resetear?")) db.ref('users/' + id + '/balance').set(0);
    }

    function verUsuarios() {
        db.ref('users').once('value', (s) => {
            let lista = "USUARIOS REGISTRADOS (Copia el ID):\n\n";
            s.forEach(u => {
                lista += ${u.val().name} | ID: ${u.key}\n\n;
            });
            alert(lista);
        });
    }
</script>
</body>
</html>
