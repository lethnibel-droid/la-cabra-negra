<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS | Lethnibel Ordóñez</title>
    <style>
        /* CONFIGURACIÓN DE IDENTIDAD ORDÓÑEZ */
        :root {
            --bg-dark: #000000;
            --neon-diamond: #00ffff; /* Cian Diamante */
            --neon-gold: #d4af37;    /* Oro Elite */
            --glass: rgba(255, 255, 255, 0.05);
            --font-main: 'Inter', 'Segoe UI', sans-serif;
        }

        body, html {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            margin: 0; padding: 0;
            overflow: hidden; /* Bloquear scroll durante la carga */
        }

        /* --- PANTALLA DE CARGA (LOADER) --- */
        #loader {
            position: fixed; inset: 0; 
            background: var(--bg-dark);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 0.8s ease;
        }

        /* Diamante Vectorial Intermitente */
        .diamond-icon {
            width: 80px; height: 80px;
            fill: none; stroke: var(--neon-diamond);
            stroke-width: 1.5;
            filter: drop-shadow(0 0 15px var(--neon-diamond));
            /* Animación Intermitente */
            animation: diamondPulse 1.2s infinite ease-in-out;
        }

        /* Lógica del Brillo Intermitente */
        @keyframes diamondPulse {
            0%, 100% { opacity: 0.2; filter: drop-shadow(0 0 2px var(--neon-diamond)); }
            50% { opacity: 1; filter: drop-shadow(0 0 20px var(--neon-diamond)); }
        }

        /* --- UI PRINCIPAL (Oculta al inicio) --- */
        #main-content {
            opacity: 0; transition: opacity 1s ease;
            padding-bottom: 90px;
        }

        /* --- HEADER ELITE --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.95);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand-box { display: flex; align-items: center; gap: 10px; }
        .brand-box span { font-weight: 800; letter-spacing: 1px; font-size: 1.1rem; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        .logo-diamond-header {
            width: 25px; height: 25px;
            fill: none; stroke: var(--neon-diamond);
            stroke-width: 2; filter: drop-shadow(0 0 5px var(--neon-diamond));
        }

        /* --- CARDS DE CRISTAL --- */
        .ad-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            margin: 20px; padding: 15px;
            position: relative;
        }

        .video-box { 
            width: 100%; aspect-ratio: 16/9; background: #080808; 
            border-radius: 12px; overflow: hidden; border: 1px solid #222;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .verified-badge {
            background: linear-gradient(90deg, var(--neon-diamond), var(--neon-gold));
            color: black; font-size: 0.65rem; font-weight: 900;
            padding: 5px 10px; border-radius: 50px; text-transform: uppercase;
            position: absolute; top: 25px; right: 25px;
        }

        /* --- INTERACCIÓN --- */
        .actions-bar { display: flex; justify-content: space-around; margin-top: 15px; }
        .btn-neon {
            background: none; border: none; color: white;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }
        .btn-neon:active { transform: scale(0.9); color: var(--neon-diamond); }

        /* --- BARRA INFERIOR ORDÓÑEZ EDITION --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #050505; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222; z-index: 1000;
        }

        .nav-link { text-align: center; opacity: 0.4; transition: 0.3s; cursor: pointer; color: white; }
        .nav-link.active { opacity: 1; color: var(--neon-diamond); }
        .nav-link i { font-size: 1.5rem; display: block; }

        /* Botón Central Diamante (+) */
        .btn-plus-diamond {
            background: white; color: black;
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold; margin-top: -35px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            position: relative; overflow: hidden;
        }
        
        .logo-diamond-btn {
            width: 30px; height: 30px;
            fill: none; stroke: #000000;
            stroke-width: 2; transition: 0.3s;
        }

        .btn-plus-diamond:active .logo-diamond-btn {
            stroke: var(--neon-diamond);
            filter: drop-shadow(0 0 5px var(--neon-diamond));
        }

    </style>
</head>
<body onclick="hideLoader()"> <div id="loader">
        <svg class="diamond-icon" viewBox="0 0 24 24">
            <path d="M12 2L2 12l10 10 10-10L12 2zM12 4.12L19.88 12 12 19.88 4.12 12 12 4.12zM12 7.5L8.5 12 12 16.5 15.5 12 12 7.5z"/>
        </svg>
    </div>

    <div id="main-content">
        <header>
            <div class="brand-box">
                <svg class="logo-diamond-header" viewBox="0 0 24 24">
                    <path d="M12 2L2 12l10 10 10-10L12 2zM12 4.12L19.88 12 12 19.88 4.12 12 12 4.12zM12 7.5L8.5 12 12 16.5 15.5 12 12 7.5z"/>
                </svg>
                <span>GOAT GLOBAL ADS</span>
            </div>
            <div style="font-size: 1.2rem; display: flex; gap: 15px; opacity: 0.7;">
                <span>🔔</span>
                <span>🔍</span>
            </div>
        </header>

        <section id="inicio" class="view active" style="display:block; padding:20px;">
            <div id="feed-container">
                <div class="ad-card glass">
                    <div class="verified-badge">Global Verified</div>
                    <div class="video-box">
                        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
                    </div>
                    <div class="actions-bar">
                        <button class="btn-neon">💎 Like</button>
                        <button class="btn-neon" onclick="alert('ROI: 5.2%')">📊 ROI</button>
                        <button class="btn-neon" onclick="alert('Enlace copiado')">🔗 Share</button>
                    </div>
                </div>
            </div>
        </section>

        <nav>
            <div class="nav-link active"><i>🏠</i>Inicio</div>
            <div class="nav-link"><i>🔥</i>Trends</div>
            <div class="btn-plus-diamond">
                <svg class="logo-diamond-btn" viewBox="0 0 24 24">
                    <path d="M12 2L2 12l10 10 10-10L12 2zM12 4.12L19.88 12 12 19.88 4.12 12 12 4.12zM12 7.5L8.5 12 12 16.5 15.5 12 12 7.5z"/>
                </svg>
            </div>
            <div class="nav-link"><i>🕒</i>Historial</div>
            <div class="nav-link"><i>👤</i>Tú</div>
        </nav>
    </div>

    <script>
        // Función para ocultar la carga y mostrar la UI
        function hideLoader() {
            const loader = document.getElementById('loader');
            const content = document.getElementById('main-content');
            
            // Efecto de desvanecimiento
            loader.style.opacity = '0';
            content.style.opacity = '1';
            
            // Permitir scroll y quitar loader del DOM tras la animación
            setTimeout(() => {
                loader.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 800);
        }

        // Simular carga automática tras 3 segundos (opcional)
        // window.onload = () => setTimeout(hideLoader, 3000);
    </script>
</body>
</html>
