<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GOAT GLOBAL ADS | Lethnibel Ordóñez</title>
    <style>
        :root {
            --bg-dark: #000000;
            --header-bg: #0f0f0f;
            --neon-diamond: #00ffff;
            --chip-bg: #272727;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow-x: hidden;
        }

        /* --- HEADER ESTILO YOUTUBE (Imagen 2) --- */
        header {
            background: var(--header-bg);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            color: var(--neon-diamond);
            font-size: 24px;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icons i {
            font-size: 20px;
            cursor: pointer;
            color: white;
        }

        /* --- BARRA DE CATEGORÍAS (CHIPS) --- */
        .categories-bar {
            background: var(--header-bg);
            padding: 12px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #222;
        }

        .categories-bar::-webkit-scrollbar { display: none; } /* Ocultar scroll */

        .chip {
            background: var(--chip-bg);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .chip.active {
            background: white;
            color: black;
        }

        /* --- CONTENEDOR DE BÚSQUEDA OCULTO (Se activa al dar click a la lupa) --- */
        #search-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 60px;
            background: var(--header-bg);
            z-index: 3000;
            align-items: center;
            padding: 0 15px;
        }

        .search-input-wrapper {
            background: #222;
            flex: 1;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border-radius: 20px;
            margin-right: 10px;
        }

        #search-overlay input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            padding: 8px;
            outline: none;
        }

        /* --- GRID DE VIDEOS --- */
        .content-area { padding-bottom: 80px; }
        .yt-card { width: 100%; margin-bottom: 15px; }
        .thumb {
            width: 100%; aspect-ratio: 16/9;
            background: #1a1a1a;
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .video-meta { display: flex; gap: 12px; padding: 12px; }
        .avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; }
        .meta-text h3 { margin: 0; font-size: 14px; font-weight: 500; line-height: 1.4; }
        .meta-text p { margin: 4px 0 0; font-size: 12px; color: #aaa; }

        /* --- NAV INFERIOR --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--header-bg); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 2000;
        }
        .nav-item { text-align: center; color: #aaa; font-size: 10px; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <div id="search-overlay">
        <i onclick="toggleSearch()" style="margin-right: 15px;">←</i>
        <div class="search-input-wrapper">
            <input type="text" placeholder="Buscar en GOAT Ads..." onkeyup="filtrar(this)">
        </div>
        <i>🎙️</i>
    </div>

    <header>
        <div class="logo-section">
            <span class="logo-icon">💎</span>
            <span>GOAT GLOBAL ADS</span>
        </div>
        <div class="header-icons">
            <i onclick="alert('Transmitiendo...')">📺</i>
            <i onclick="alert('Sin notificaciones')">🔔</i>
            <i onclick="toggleSearch()">🔍</i>
        </div>
    </header>

    <div class="categories-bar">
        <div class="chip active">Todo</div>
        <div class="chip">Novedad para ti</div>
        <div class="chip">Música</div>
        <div class="chip">Estrategias</div>
        <div class="chip">Videojuegos</div>
        <div class="chip">Directos</div>
    </div>

    <div class="content-area">
        <div id="feed">
            <div class="yt-card">
                <div class="thumb">
                    <iframe src="https://www.youtube.com/embed/S9uTsc_S288" allowfullscreen></iframe>
                </div>
                <div class="video-meta">
                    <div class="avatar"></div>
                    <div class="meta-text">
                        <h3 class="v-title">SISTEMA ORDÓÑEZ: MONETIZACIÓN REAL</h3>
                        <p>Lethnibel Ordóñez • 10M vistas • hace 1 hora</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active">🏠<br>Inicio</div>
        <div class="nav-item">🔥<br>Shorts</div>
        <div style="font-size: 24px; color: var(--neon-diamond);">⊕</div>
        <div class="nav-item">🕒<br>Suscripciones</div>
        <div class="nav-item">👤<br>Tú</div>
    </nav>

    <script>
        function toggleSearch() {
            const overlay = document.getElementById('search-overlay');
            overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
        }

        function filtrar(input) {
            const val = input.value.toLowerCase();
            const cards = document.getElementsByClassName('yt-card');
            for (let card of cards) {
                const title = card.querySelector('.v-title').innerText.toLowerCase();
                card.style.display = title.includes(val) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
