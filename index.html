<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA CABRA NEGRA | Plataforma 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="activarAudioContexto()"> <header class="navbar efecto-glass">
        <div class="logo">LA CABRA NEGRA</div>
        <div id="user-area">
            <button class="btn-ui" onclick="abrirModal('modal-login')">ACCEDER</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar efecto-glass">
            <div class="nav-item" onclick="location.reload()">🏠 Inicio</div>
            <div class="nav-item" onclick="abrirModal('modal-subir')">📤 Publicar</div>
            <div class="nav-item" onclick="abrirModal('modal-estetica')">🎨 Estética</div>
            <hr style="opacity:0.1; margin:15px 0;">
            <button id="btn-music" class="btn-music" onclick="toggleMusica()">🎵 MÚSICA: OFF</button>
        </aside>

        <main class="feed">
            <div class="hero-seccion">
                <h1>Cartelera Global</h1>
                <p>Publicidad que se adapta a tu mundo.</p>
            </div>
            <div id="grid-videos" class="video-grid">
                </div>
        </main>
    </div>

    <div id="modal-subir" class="modal">
        <div class="modal-content efecto-glass">
            <h3>Lanzar Anuncio</h3>
            <input type="text" id="v-titulo" placeholder="Título">
            <input type="text" id="v-url" placeholder="Link de YouTube">
            <input type="text" id="v-social" placeholder="Red Social (Link)">
            <button class="btn-ui" onclick="motorPublicar()">PUBLICAR</button>
            <button class="btn-text" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>

    <audio id="audio-azul" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="audio-rojo" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="audio-morado" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
<audio id="audio-azul" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
<audio id="audio-rojo" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
<audio id="audio-morado" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
