<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA CABRA NEGRA | Edición Profesional</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">LA CABRA NEGRA</div>
        <div id="user-area">
            <button class="btn-ui" onclick="abrirModal('modal-login')">INICIAR SESIÓN</button>
        </div>
    </header>

    <div class="main-container">
        <aside>
            <div class="nav-item active" onclick="mostrarSeccion('inicio', this)">🏠 Cartelera</div>
            <div class="nav-item" onclick="mostrarSeccion('ajustes', this)">⚙️ Estética</div>
            <div class="nav-item" onclick="abrirModal('modal-subir')">📤 Publicar</div>
        </aside>

        <main>
            <section id="inicio" class="section active">
                <h2 class="titulo-seccion">Anuncios <span class="destaque">Activos</span></h2>
                <div class="video-grid" id="grid-videos"></div>
            </section>

            <section id="ajustes" class="section">
                <h2>Configuración Visual</h2>
                <p>Elige un color para la plataforma:</p>
                <div class="theme-flex">
                    <button class="dot azul" onclick="cambiarTema('#00d2ff')"></button>
                    <button class="dot rojo" onclick="cambiarTema('#ff2d55')"></button>
                    <button class="dot morado" onclick="cambiarTema('#a259ff')"></button>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <h2>Crear Cuenta</h2>
            <input type="text" id="user-name" placeholder="Tu Nombre o Marca">
            <button class="btn-ui full" onclick="simularLogin()">REGISTRARME</button>
        </div>
    </div>

    <div id="modal-subir" class="modal">
        <div class="modal-content">
            <h2>Publicar Video</h2>
            <input type="text" id="v-titulo" placeholder="Título del anuncio">
            <input type="text" id="v-url" placeholder="URL de YouTube">
            <button class="btn-ui full" onclick="publicar()">PUBLICAR</button>
            <button class="btn-cerrar" onclick="cerrarModales()">Cancelar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
