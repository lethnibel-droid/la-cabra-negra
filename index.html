<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS - OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff7f;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: #000; color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- UI COMPONENTS --- */
        header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--glass);
        }

        .logo {
            font-size: 1.4rem; font-weight: 900; color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue); text-transform: uppercase;
        }

        .nav-menu {
            display: flex; gap: 12px; padding: 12px;
            background: #050505; overflow-x: auto; scrollbar-width: none;
        }

        .nav-item {
            padding: 8px 20px; background: #111; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; border: 1px solid #222;
            transition: 0.3s; white-space: nowrap;
        }

        .nav-item.active { background: white; color: black; font-weight: bold; }

        .page-section { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- VIDEO GRID --- */
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .video-card {
            background: #0a0a0a; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--glass);
        }

        iframe { border: none; width: 100%; aspect-ratio: 16/9; }
        .short-iframe { aspect-ratio: 9/16; }

        .video-info { padding: 10px; font-size: 0.8rem; border-top: 1px solid var(--glass); }

        /* --- ADMIN & LOGIN --- */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .btn-main {
            padding: 15px 35px; border-radius: 30px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .fab {
            position: fixed; bottom: 25px; right: 25px;
            width: 60px; height: 60px; background: var(--neon-purple);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 30px; box-shadow: 0 0 15px var(--neon-purple);
            cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo" style="font-size: 3.5rem;">GOAT</div>
    <button class="btn-main" style="margin-top: 30px;" onclick="login()">ENTRAR CON GOOGLE</button>
</div>

<header>
    <div class="logo">GOAT</div>
    <div id="u-balance" style="color:var(--neon-green); font-weight:bold;">$0.00</div>
</header>

<div class="nav-menu">
    <div class="nav-item active" onclick="switchTab('home', this)">Inicio</div>
    <div class="nav-item" onclick="switchTab('shorts', this)">Shorts</div>
    <div class="nav-item" onclick="switchTab('profile', this)">Mi Panel</div>
    <div class="nav-item" id="admin-tab" style="display:none; border-color:red;" onclick="switchTab('admin', this)">Director</div>
</div>

<main>
    <section id="home" class="page-section active"><div class="video-grid" id="grid-home"></div></section>
    <section id="shorts" class="page-section"><div class="video-grid" id="grid-shorts" style="grid-template-columns: repeat(2, 1fr);"></div></section>
    <section id="profile" class="page-section">
        <div id="user-data" style="margin-bottom:20px; font-size:0.9rem; opacity:0.7;"></div>
        <h4>Mis Publicaciones</h4>
        <div class="video-grid" id="grid-profile"></div>
    </section>
    <section id="admin" class="page-section">
        <div style="background:#111; padding:20px; border-radius:12px; border:1px solid red;">
            <input type="text" id="target-id" placeholder="ID Usuario" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:white; border:1px solid #333;">
            <button onclick="adjBalance(1)" style="background:green; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">+ $1.00</button>
            <button onclick="adjBalance(0, true)" style="background:red; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">Reset</button>
            <button onclick="listUsers()" style="background:#333; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">Listar Usuarios</button>
        </div>
    </section>
</main>

<div class="fab" onclick="uploadContent()">+</div>

<script>
    const ADMIN_EMAIL = "Lethnibel@gmail.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDh_u5eDv_fnSUXiDsHs-iJKZFgtOV3Jgw",
      authDomain: "flutter-ai-playground-93f86.firebaseapp.com",
      databaseURL: "https://flutter-ai-playground-93f86-default-rtdb.firebaseio.com/",
      projectId: "flutter-ai-playground-93f86",
      storageBucket: "flutter-ai-playground-93f86.firebasestorage.app",
      messagingSenderId: "912054292680",
      appId: "1:912054292680:web:80b3c73a7c669a061b95fd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- SESIÓN EFICIENTE ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-tab').style.display = (user.email === ADMIN_EMAIL) ? 'block' : 'none';
            document.getElementById('user-data').innerText = Cuenta: ${user.email} | ID: ${user.uid};
            syncUser(user);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    async function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            await auth.signInWithPopup(provider);
        } catch (e) { alert("Error: " + e.message); }
    }

    function syncUser(user) {
        const ref = db.ref('users/' + user.uid);
        ref.on('value', s => {
            if (!s.exists()) ref.set({ email: user.email, name: user.displayName, balance: 0, uid: user.uid });
            else document.getElementById('u-balance').innerText = $${(s.val().balance || 0).toFixed(2)};
        });
        fetchContent();
    }

    // --- LÓGICA DE CONTENIDO ---
    function switchTab(id, el) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function fetchContent() {
        db.ref('videos').on('value', s => {
            const grids = { home: document.getElementById('grid-home'), shorts: document.getElementById('grid-shorts'), profile: document.getElementById('grid-profile') };
            Object.values(grids).forEach(g => g.innerHTML = '');

            s.forEach(child => {
                const v = child.val();
                const isShort = v.tipo === 'short';
                const card = `
                    <div class="video-card">
                        <iframe class="${isShort ? 'short-iframe' : ''}" src="https://www.youtube.com/embed/${v.id}"></iframe>
                        <div class="video-info"><b>${v.titulo}</b><br><small>${v.user}</small></div>
                    </div>`;
                
                if (isShort) grids.shorts.innerHTML += card; else grids.home.innerHTML += card;
                if (v.uid === auth.currentUser.uid) grids.profile.innerHTML += card;
            });
        });
    }

    function uploadContent() {
        const isShort = confirm("¿Es un Short?");
        const titulo = prompt("Título:");
        const url = prompt("Enlace de YouTube:");
        if (url && titulo) {
            const id = url.match(/(?:v=|\/shorts\/|\/)([a-zA-Z0-9_-]{11})/)?.[1];
            if (id) {
                db.ref('videos').push({ id, titulo, tipo: isShort?'short':'video', uid: auth.currentUser.uid, user: auth.currentUser.displayName });
            } else alert("URL inválida");
        }
    }

    // --- ADMIN ---
    function adjBalance(amt, reset = false) {
        const id = document.getElementById('target-id').value.trim();
        if (!id) return alert("ID Requerido");
        const ref = db.ref(users/${id}/balance);
        reset ? ref.set(0) : ref.transaction(c => (c || 0) + amt);
    }

    function listUsers() {
        db.ref('users').once('value', s => {
            let txt = "USUARIOS:\n";
            s.forEach(u => txt += ${u.val().name}: ${u.key}\n);
            alert(txt);
        });
    }
</script>
</body>
</html>
