<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT GLOBAL ADS - OFICIAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff7f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVEGACIÓN --- */
        header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-menu {
            display: flex;
            gap: 12px;
            padding: 12px 15px;
            background: #050505;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid #111;
        }

        .nav-item {
            padding: 10px 22px;
            background: #151515;
            border-radius: 25px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .nav-item.active {
            background: white;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* --- SECCIONES --- */
        .page-section { 
            display: none; 
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }
        .page-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .balance-badge {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* --- GRIDS DE VIDEOS --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 900px) {
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass);
            transition: 0.3s;
        }

        .video-card:hover { border-color: var(--neon-blue); transform: translateY(-3px); }

        iframe { border: none; width: 100%; aspect-ratio: 16/9; display: block; }
        .short-iframe { aspect-ratio: 9/16; }

        .video-info { padding: 12px; font-size: 0.85rem; }

        /* --- PANTALLA LOGIN --- */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
        }

        .btn-google {
            background: white;
            color: black;
            padding: 16px 40px;
            border-radius: 35px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 25px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .btn-google:hover { transform: scale(1.05); background: var(--neon-blue); }

        .fab {
            position: fixed; bottom: 25px; right: 25px;
            width: 60px; height: 60px; background: var(--neon-purple);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 30px; box-shadow: 0 0 20px var(--neon-purple);
            cursor: pointer; z-index: 1001; transition: 0.2s;
        }
        .fab:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="logo" style="font-size: 4.5rem; margin-bottom: 0;">GOAT</div>
    <p style="color: #444; letter-spacing: 8px; font-weight: bold;">GLOBAL ADS</p>
    <div style="margin-top: 50px;">
        <h2 style="font-size: 1.3rem; margin-bottom: 10px;">Acceso al Directorio</h2>
        <p style="color: #777; font-size: 0.9rem;">Registra tu cuenta de Google para continuar</p>
        <button class="btn-google" onclick="login()">CONTINUAR CON GOOGLE</button>
    </div>
</div>

<header>
    <div class="logo">GOAT</div>
    <div id="u-balance" class="balance-badge">$0.00</div>
</header>

<div class="nav-menu" id="main-nav">
    <div class="nav-item active" onclick="showSection('home', this)">Muro VIP</div>
    <div class="nav-item" onclick="showSection('shorts', this)">Shorts</div>
    <div class="nav-item" onclick="showSection('history', this)">Mi Panel</div>
    <div class="nav-item" onclick="showSection('admin', this)" id="admin-tab" style="display:none; color: #ff4444; border-color: #ff4444;">Director</div>
</div>

<div id="home" class="page-section active">
    <div class="video-grid" id="video-wall"></div>
</div>

<div id="shorts" class="page-section">
    <div class="video-grid" id="shorts-wall" style="grid-template-columns: repeat(2, 1fr);"></div>
</div>

<div id="history" class="page-section">
    <div style="background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222;">
        <h3 style="margin-top:0;">Información de Cuenta</h3>
        <p id="user-info-display" style="color: #00f2ff; font-family: monospace; font-size: 0.85rem;"></p>
    </div>
    <h4 style="margin-top: 30px;">Tus Publicaciones Guardadas</h4>
    <div id="user-history" class="video-grid"></div>
</div>

<div id="admin" class="page-section">
    <div style="background: rgba(255,0,0,0.05); border: 1px solid #ff4444; padding: 20px; border-radius: 15px;">
        <h3 style="color: #ff4444; margin-top: 0;">🛠️ CONTROL DE SALDOS</h3>
        <input type="text" id="target-id" style="width:100%; padding:12px; background:#000; color:white; border:1px solid #333; border-radius:8px; margin-bottom:15px;" placeholder="Pega el ID del Usuario aquí...">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button onclick="updateBalance(1.00)" style="background: #25d366; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">Sumar $1.00</button>
            <button onclick="resetBalance()" style="background: #ff4444; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; color:white;">Resetear Saldo</button>
            <button onclick="verUsuarios()" style="background: #333; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; color:white;">Ver Usuarios e IDs</button>
        </div>
    </div>
</div>

<div class="fab" onclick="postContenido()">+</div>

<script>
    // CONFIGURACIÓN
    const ADMIN_EMAIL = "Lethnibel@gmail.com";
    const firebaseConfig = {
      apiKey: "AIzaSyDh_u5eDv_fnSUXiDsHs-iJKZFgtOV3Jgw",
      authDomain: "flutter-ai-playground-93f86.firebaseapp.com",
      databaseURL: "https://flutter-ai-playground-93f86-default-rtdb.firebaseio.com/",
      projectId: "flutter-ai-playground-93f86",
      storageBucket: "flutter-ai-playground-93f86.firebasestorage.app",
      messagingSenderId: "912054292680",
      appId: "1:912054292680:web:80b3c73a7c669a061b95fd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- SISTEMA DE SESIÓN PERMANENTE ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            if(user.email === ADMIN_EMAIL) {
                document.getElementById('admin-tab').style.display = 'block';
            }
            document.getElementById('user-info-display').innerText = EMAIL: ${user.email}\nID: ${user.uid};
            setupUser(user);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    // CORRECCIÓN: Usar Redirect para que no falle el botón
    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
            return auth.signInWithRedirect(provider);
        }).catch(err => alert("Error al conectar: " + err.message));
    }

    function setupUser(user) {
        const ref = db.ref('users/' + user.uid);
        ref.on('value', (s) => {
            if (!s.exists()) {
                ref.set({ balance: 0.00, email: user.email, name: user.displayName, uid: user.uid });
            } else {
                document.getElementById('u-balance').innerText = '$' + s.val().balance.toFixed(2);
            }
        });
        loadContent();
    }

    // CORRECCIÓN: Navegación de pestañas fluida
    function showSection(id, el) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // CARGA DE CONTENIDO DESDE DATABASE
    function loadContent() {
        db.ref('videos').on('value', (s) => {
            const wall = document.getElementById('video-wall');
            const shortsWall = document.getElementById('shorts-wall');
            const historyWall = document.getElementById('user-history');
            
            wall.innerHTML = '';
            shortsWall.innerHTML = '';
            historyWall.innerHTML = '';

            s.forEach((child) => {
                const v = child.val();
                const isShort = v.tipo === 'short';
                const cardHtml = `
                    <div class="video-card">
                        <iframe class="${isShort ? 'short-iframe' : ''}" src="https://www.youtube.com/embed/${v.id}"></iframe>
                        <div class="video-info">
                            <strong style="color:var(--neon-blue);">${v.titulo}</strong><br>
                            <small>Publicado por: ${v.user}</small>
                        </div>
                    </div>`;

                if(isShort) shortsWall.innerHTML += cardHtml;
                else wall.innerHTML += cardHtml;

                if(v.uid === auth.currentUser.uid) historyWall.innerHTML += cardHtml;
            });
        });
    }

    // PUBLICAR NUEVO CONTENIDO (Guarda en Database)
    function postContenido() {
        const tipo = confirm("¿Publicar como SHORT? (Aceptar = SI / Cancelar = VIDEO LARGO)") ? 'short' : 'video';
        const titulo = prompt("Título del video:");
        const link = prompt("Pega el enlace de YouTube:");
        
        if(link && titulo) {
            let id = "";
            if(link.includes('v=')) id = link.split('v=')[1].split('&')[0];
            else if(link.includes('shorts/')) id = link.split('shorts/')[1].split('?')[0];
            else id = link.split('/').pop().split('?')[0];

            db.ref('videos').push({
                id: id,
                titulo: titulo,
                tipo: tipo,
                user: auth.currentUser.displayName,
                uid: auth.currentUser.uid,
                timestamp: Date.now()
            });
        }
    }

    // FUNCIONES DEL DIRECTOR
    function updateBalance(amt) {
        const id = document.getElementById('target-id').value.trim();
        if(!id) return alert("Error: Por favor ingresa el ID del usuario.");
        db.ref('users/' + id + '/balance').transaction(c => (c || 0) + amt);
    }

    function resetBalance() {
        const id = document.getElementById('target-id').value.trim();
        if(confirm("¿Seguro que quieres poner el saldo en $0.00?")) {
            db.ref('users/' + id + '/balance').set(0);
        }
    }

    function verUsuarios() {
        db.ref('users').once('value', (s) => {
            let lista = "LISTADO DE IDs PARA SALDOS:\n\n";
            s.forEach(u => {
                lista += ${u.val().name} -> ID: ${u.key}\n\n;
            });
            alert(lista);
        });
    }
</script>
</body>
</html>
