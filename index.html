    </ul>

  <!-- Top Bar -->
  <div id="top-bar" class="top-bar">
    <span id="user-name">Usuario</span>
    <span id="credits">⚡ Créditos: 0</span>
  </div>

  <!-- Main Content -->
  <div id="content" class="content">
    <h1>Bienvenido a GOAT GLOBAL ADS</h1>
    <button onclick="signIn()">Iniciar sesión con Google</button>
  </div>

  <!-- YouTube Iframe API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // Variables globales
    let currentUser = null;

    // Función de inicio de sesión con Google
    function signIn() {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(async (result) => {
          const user = result.user;
          currentUser = user;
          document.getElementById('user-name').innerText = user.displayName;
          await createUserDocument(user);
          showHome();
        })
        .catch((error) => {
          console.error(error);
        });
    }

    // Crear un documento de usuario si no existe
    async function createUserDocument(user) {
      const userRef = doc(db, 'users', user.uid);
      const docSnap = await getDoc(userRef);
      if (!docSnap.exists()) {
        await setDoc(userRef, { creditos: 0 });
      }
      updateCreditsDisplay(user.uid);
    }

    // Mostrar el home y los créditos
    function showHome() {
      document.getElementById('content').innerHTML = <h1>Bienvenido, ${currentUser.displayName}</h1>;
      updateCreditsDisplay(currentUser.uid);
    }

    // Actualizar los créditos en pantalla
    async function updateCreditsDisplay(userId) {
      const userRef = doc(db, 'users', userId);
      const docSnap = await getDoc(userRef);
      if (docSnap.exists()) {
        document.getElementById('credits').innerText = ⚡ Créditos: ${docSnap.data().creditos};
      }
    }

    // Función para ver videos
    function showVideos() {
      document.getElementById('content').innerHTML = `
        <div id="video-player"></div>
        <button id="claim-credits" disabled>Reclamar 10 Créditos</button>
      `;
      loadYouTubePlayer();
    }

    // Cargar el reproductor de YouTube
    function loadYouTubePlayer() {
      new YT.Player('video-player', {
        videoId: 'dQw4w9WgXcQ', // Reemplazar con el ID de tu video
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }

    // Cambiar el estado del video
    function onPlayerStateChange(event) {
      const claimButton = document.getElementById('claim-credits');
      if (event.data === YT.PlayerState.ENDED) {
        claimButton.disabled = false;
      }
    }

    // Reclamar créditos
    document.getElementById('claim-credits').addEventListener('click', async () => {
      const userRef = doc(db, 'users', currentUser.uid);
      const userSnap = await getDoc(userRef);
      const newCredits = userSnap.data().creditos + 10;
      await updateDoc(userRef, { creditos: newCredits });
      updateCreditsDisplay(currentUser.uid);
    });

    // Cerrar sesión
    function signOutUser() {
      signOut(auth)
        .then(() => {
          currentUser = null;
          document.getElementById('user-name').innerText = 'Usuario';
          document.getElementById('credits').innerText = '⚡ Créditos: 0';
          showHome();
        })
        .catch((error) => {
          console.error(error);
        });
    }

    // Funciones de navegación
    function showCampaigns() {
      document.getElementById('content').innerHTML = `

        <input type="text" id="video-link" placeholder="Pega tu enlace de YouTube">
        <button onclick="submitCampaign()">Crear campaña</button>
      `;
    }
