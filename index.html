    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff7f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-menu {
            display: flex;
            gap: 12px;
            padding: 12px 15px;
            background: #050505;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid #111;
        }

        .nav-item {
            padding: 10px 22px;
            background: #151515;
            border-radius: 25px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .nav-item.active {
            background: white;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .page-section { 
            display: none; 
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }
        .page-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .balance-badge {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 900px) {
            .video-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass);
            transition: 0.3s;
        }
