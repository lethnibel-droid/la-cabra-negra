<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT GLOBAL ADS - Versión Final Profesional</title>
<!-- Firebase SDK 9.17.1 compat -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
/* ========================== VARIABLES NEÓN ========================== */
:root {
    --neon-blue: #00f2ff;
    --neon-purple: #bc13fe;
    --bg-color: #000;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.2);
    --font-family: 'Arial', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: var(--font-family);
}

body {
    background-color: var(--bg-color);
    color: var(--neon-blue);
}

/* ========================== NAVEGACIÓN SPA ========================== */
nav {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 1rem;
    background: var(--glass-bg);
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
}

nav button {
    background: none;
    border: 1px solid var(--neon-blue);
    color: var(--neon-blue);
    padding: 0.5rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

nav button:hover {
    background-color: var(--neon-purple);
    border-color: var(--neon-purple);
}

/* ========================== CONTENIDO ========================== */
.tab-content {
    display: none;
    padding: 1rem;
}

.tab-content.active {
    display: block;
}

/* ========================== TARJETAS GLASSMORPHISM ========================== */
.card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    padding: 1rem;
    margin: 1rem 0;
    backdrop-filter: blur(10px);
}

/* ========================== BOTONES ========================== */
button.primary {
    background-color: var(--neon-blue);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    color: #000;
    cursor: pointer;
    margin: 0.5rem 0;
}

button.primary:hover {
    background-color: var(--neon-purple);
}

/* ========================== RESPONSIVE ========================== */
@media (max-width: 768px) {
    nav {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<nav>
    <button data-tab="home">Inicio</button>
    <button data-tab="shorts">Shorts</button>
    <button data-tab="panel">Mi Panel</button>
    <button data-tab="director">Director</button>
    <button id="loginBtn">Login con Google</button>
    <button id="logoutBtn" style="display:none;">Cerrar Sesión</button>
</nav>

<!-- ========================== CONTENIDO SPA ========================== -->
<div id="home" class="tab-content active">
    <h2>Muro VIP</h2>
    <div id="videoFeed"></div>
</div>

<div id="shorts" class="tab-content">
    <h2>Shorts</h2>
    <div id="shortsFeed"></div>
</div>

<div id="panel" class="tab-content">
    <h2>Mi Panel</h2>
    <div id="userVideos"></div>
    <h3>Publicar Video</h3>
    <input type="text" id="videoUrl" placeholder="URL de YouTube" style="width:80%;">
    <button class="primary" id="publishBtn">Publicar</button>
</div>

<div id="director" class="tab-content">
    <h2>Panel Director</h2>
    <input type="text" id="searchUid" placeholder="Buscar por UID">
    <button class="primary" id="searchUserBtn">Buscar Usuario</button>
    <div id="adminControls"></div>
</div>

<script>
// ========================== CONFIG FIREBASE ==========================
const firebaseConfig = {
  apiKey: "AIzaSyDh_u5eDv_fnSUXiDsHs-iJKZFgtOV3Jgw",
  authDomain: "flutter-ai-playground-93f86.firebaseapp.com",
  databaseURL: "https://flutter-ai-playground-93f86-default-rtdb.firebaseio.com/",
  projectId: "flutter-ai-playground-93f86",
  storageBucket: "flutter-ai-playground-93f86.firebasestorage.app",
  messagingSenderId: "912054292680",
  appId: "1:912054292680:web:80b3c73a7c669a061b95fd"
};
const ADMIN_EMAIL = "Lethnibel@gmail.com";

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ========================== LOGIN GOOGLE ==========================
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');

const provider = new firebase.auth.GoogleAuthProvider();

loginBtn.addEventListener('click', () => {
    auth.signInWithRedirect(provider);
});

logoutBtn.addEventListener('click', () => {
    auth.signOut();
});

auth.onAuthStateChanged(user => {
    if(user){
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
        if(user.email !== ADMIN_EMAIL){
            document.querySelector('[data-tab="director"]').style.display = 'none';
        }
        loadVideos();
        loadUserVideos();
    } else {
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
        document.querySelector('[data-tab="director"]').style.display = 'inline-block';
    }
});

// Captura el resultado del redirect
auth.getRedirectResult().then(result => {
    if(result.user){
        console.log("Sesión iniciada:", result.user.displayName);
    }
}).catch(error => console.error(error));

// ========================== SPA NAVEGACIÓN ==========================
const tabs = document.querySelectorAll('nav button[data-tab]');
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// ========================== GESTIÓN DE VIDEOS ==========================
function extractYouTubeID(url) {
    const regex = /(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
    const match = url.match(regex);
    return match ? match[1] : null;
}

const publishBtn = document.getElementById('publishBtn');
publishBtn.addEventListener('click', () => {
    const url = document.getElementById('videoUrl').value;
    const videoID = extractYouTubeID(url);
    if(!videoID){
        alert("URL de YouTube inválida");
        return;
    }
    const user = auth.currentUser;
    if(!user) return alert("Debes iniciar sesión");
    const videoRef = db.ref('videos').push();
    videoRef.set({
        videoID,
        uid: user.uid,
        author: user.displayName,
        timestamp: Date.now()
    }).then(()=> {
        alert("Video publicado!");
        document.getElementById('videoUrl').value = '';
        loadVideos();
        loadUserVideos();
    });
});

// ========================== CARGA DE VIDEOS ==========================
function loadVideos(){
    const feed = document.getElementById('videoFeed');
    feed.innerHTML = '';
    db.ref('videos').orderByChild('timestamp').limitToLast(50).once('value', snapshot => {
        snapshot.forEach(child => {
            const data = child.val();
            const card = document.createElement('div');
            card.classList.add('card');
            card.innerHTML = `<p><strong>${data.author}</strong></p>
                              <iframe width="100%" height="200" src="https://www.youtube.com/embed/${data.videoID}" frameborder="0" allowfullscreen></iframe>`;
            feed.prepend(card);
        });
    });
}

function loadUserVideos(){
    const panel = document.getElementById('userVideos');
    panel.innerHTML = '';
    const user = auth.currentUser
