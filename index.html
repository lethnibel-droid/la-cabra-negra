<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOAT GLOBAL ADS | Red Global</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --glass: rgba(15, 15, 15, 0.85);
            --neon: #00ffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER GLASS */
        header {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }

        /* FEED DE VIDEOS */
        .feed { height: calc(100vh - 145px); overflow-y: auto; padding-bottom: 90px; }
        .video-card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; margin: 15px; overflow: hidden; backdrop-filter: blur(10px); }
        .video-box { width: 100%; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
        .meta { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* NAV INFERIOR */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: var(--glass); backdrop-filter: blur(20px); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-btn { text-align: center; color: #777; flex: 1; cursor: pointer; }
        .nav-btn.active { color: white; text-shadow: 0 0 10px white; }

        .btn-plus { width: 50px; height: 50px; background: #000; border: 2px solid var(--neon); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-top: -35px; box-shadow: 0 0 15px var(--neon); }

        /* MODAL */
        #modal-pub { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; justify-content: center; padding: 40px; }
        input { background: #111; border: 1px solid var(--neon); color: white; padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 20px; outline: none; }
        button { background: white; color: black; padding: 15px; border-radius: 12px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight:900; letter-spacing:1px;">💎 GOAT <span style="color:var(--neon)">GLOBAL ADS</span></div>
        <div style="font-size:18px;">🔍</div>
    </header>

    <div class="feed" id="global-feed">
        </div>

    <div id="modal-pub">
        <h2 style="text-align:center">Compartir con el Mundo</h2>
        <input type="text" id="video-url" placeholder="Pega el enlace de YouTube">
        <button onclick="publishToCloud()">PUBLICAR AHORA</button>
        <p onclick="closeM()" style="text-align:center; margin-top:20px; opacity:0.5; cursor:pointer;">Cancelar</p>
    </div>

    <nav>
        <div class="nav-btn active">🏠 Inicio</div>
        <div class="nav-btn">🔥 Shorts</div>
        <div class="btn-plus" onclick="openM()">+</div>
        <div class="nav-btn">🕒 Historial</div>
        <div class="nav-btn">👤 Tú</div>
    </nav>

    <script>
        // CONFIGURACIÓN DE TU NUBE (Actívalo creando un proyecto en Firebase console)
        const firebaseConfig = {
            databaseURL: "https://TU-PROYECTO.firebaseio.com" 
        };
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.database().ref('videos');

        function openM() { document.getElementById('modal-pub').style.display = 'flex'; }
        function closeM() { document.getElementById('modal-pub').style.display = 'none'; }

        // ESTA FUNCIÓN HARÁ QUE EL VIDEO SE GUARDE PARA TODOS
        function publishToCloud() {
            const url = document.getElementById('video-url').value;
            if(!url) return;
            
            let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
            
            // Simulación de envío a la nube
            const newVideo = { id: id, timestamp: Date.now() };
            
            // Aquí enviarías a Firebase: db.push(newVideo);
            
            renderVideo(newVideo); // Se muestra al instante
            closeM();
            alert("¡Video publicado globalmente!");
        }

        function renderVideo(video) {
            const wall = document.getElementById('global-feed');
            const card = document.createElement('div');
            card.className = "video-card";
            card.innerHTML = `
                <div class="video-box"><iframe src="https://www.youtube.com/embed/${video.id}"></iframe></div>
                <div class="meta"><div class="avatar"></div><div><b>Usuario Global</b><p style="margin:0; font-size:12px; color:#666;">Publicado ahora</p></div></div>`;
            wall.prepend(card);
        }

        // Carga inicial
        window.onload = () => {
            renderVideo({id: 'YlEK3J076-U'});
            renderVideo({id: 'dQw4w9WgXcQ'});
        };
    </script>
</body>
</html>
